<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Factory Board</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 6px;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 86% 14%;
      gap: 12px;
    }

    .top {
      display: grid;
      grid-template-columns: 71% 21.5% 7.5%;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #000;
    }

    th, td {
      border: 1px solid #5a5a5a;
      text-align: center;
      vertical-align: middle;
      padding: 6px 6px;
      color: #ff9d00;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      font-size: 18px;
      height: 34px;
    }

    td {
      font-size: 18px;
      height: 38px;
    }

    .main-table col:nth-child(1) { width: 18%; }
    .main-table col:nth-child(2) { width: 17%; }
    .main-table col:nth-child(3) { width: 22%; }
    .main-table col:nth-child(4) { width: 22%; }
    .main-table col:nth-child(5) { width: 21%; }

    .ship-table col:nth-child(1) { width: 68%; }
    .ship-table col:nth-child(2) { width: 32%; }

    .inspect-table col:nth-child(1) { width: 100%; }

    .bulletin-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .bulletin-title {
      border: 1px solid #5a5a5a;
      border-bottom: none;
      color: #ff9d00;
      font-weight: 700;
      font-size: 22px;
      padding: 4px 10px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    .bulletin-box {
      flex: 1;
      border: 1px solid #5a5a5a;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      min-height: 0;
    }

    .bulletin-line {
      border-top: 1px solid #5a5a5a;
      color: #fff;
      font-size: 20px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bulletin-line:first-child {
      border-top: none;
    }

    .delay {
      color: #fff !important;
      background: #e10600 !important;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { background: #e10600; color: #fff; }
      50% { background: #000; color: #e10600; }
      100% { background: #e10600; color: #fff; }
    }

    .muted {
      color: #cfcfcf !important;
    }

    .error {
      color: red;
      font-size: 26px;
      font-weight: 700;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <div class="panel">
        <table class="main-table">
          <colgroup><col><col><col><col><col></colgroup>
          <thead><tr id="mainHead"></tr></thead>
          <tbody id="mainBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <table class="ship-table">
          <colgroup><col><col></colgroup>
          <thead><tr id="shipHead"></tr></thead>
          <tbody id="shipBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <table class="inspect-table">
          <colgroup><col></colgroup>
          <thead><tr id="inspectHead"></tr></thead>
          <tbody id="inspectBody"></tbody>
        </table>
      </div>
    </div>

    <div class="bulletin-wrap">
      <div class="bulletin-title" id="bulletinTitle">BULLETIN</div>
      <div class="bulletin-box" id="bulletinBox"></div>
    </div>
  </div>

  <script>
    const sheetId = "1ML2ozfDmFhVqVetf0zNlrJRfnvfQZ_xrUP-gLN80XQ8";
    const gid = "0";

    let isLoading = false;
    let timeoutId = null;
    let lastSnapshot = "";

    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    function formatCell(cell) {
      if (!cell) return "";

      if (typeof cell.v === "string") return cell.v.trim();

      if (cell.f && /^(\d{1,2})-([A-Za-z]{3})$/.test(String(cell.f).trim())) {
        return String(cell.f).trim();
      }

      if (cell.v instanceof Date) {
        return `${cell.v.getDate()}-${monthNames[cell.v.getMonth()]}`;
      }

      const raw = cell.v != null ? String(cell.v).trim() : "";
      const match = raw.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})/);
      if (match) {
        const month = Number(match[2]);
        const day = Number(match[3]);
        return `${day}-${monthNames[month]}`;
      }

      if (cell.f) return String(cell.f).trim();
      return raw;
    }

    function rawCell(cell) {
      if (!cell) return "";
      if (cell.v == null) return "";
      return String(cell.v).trim();
    }

    function getClass(cell, shownValue) {
      const raw = rawCell(cell).toUpperCase();
      const shown = String(shownValue || "").trim().toUpperCase();

      if (raw === "DELAY" || shown === "DELAY") return "delay";
      if (shown === "N/A" || shown === "-") return "muted";
      return "";
    }

    function buildCell(tag, cell) {
      const shownValue = formatCell(cell);
      const cls = getClass(cell, shownValue);
      const el = document.createElement(tag);
      el.textContent = shownValue;
      if (cls) el.classList.add(cls);
      return el;
    }

    function val(row, idx) {
      return (row && row[idx]) ? row[idx] : null;
    }

    function renderBoard(table) {
      const rows = table.rows || [];
      if (!rows.length) {
        document.body.innerHTML = '<div class="error">No sheet data found.</div>';
        return;
      }

      const snapshot = JSON.stringify(rows);
      if (snapshot === lastSnapshot) return;
      lastSnapshot = snapshot;

      // Exact sheet columns after you deleted the extra top rows/left column:
      // A:E = main board
      // G:H = incoming/date
      // J   = inspection

      const headerRow = rows[0].c || [];
      const dataRows = rows.slice(1);

      const bulletinIndex = dataRows.findIndex(r => {
        const c = r.c || [];
        const aVal = formatCell(c[0]).trim().toUpperCase();
        return aVal === "BULLETIN";
      });

      const upperRows = bulletinIndex >= 0 ? dataRows.slice(0, bulletinIndex) : dataRows;
      const bulletinRows = bulletinIndex >= 0 ? dataRows.slice(bulletinIndex + 1, bulletinIndex + 4) : [];

      const mainHead = document.getElementById("mainHead");
      const shipHead = document.getElementById("shipHead");
      const inspectHead = document.getElementById("inspectHead");
      const mainBody = document.getElementById("mainBody");
      const shipBody = document.getElementById("shipBody");
      const inspectBody = document.getElementById("inspectBody");

      mainHead.innerHTML = "";
      shipHead.innerHTML = "";
      inspectHead.innerHTML = "";
      mainBody.innerHTML = "";
      shipBody.innerHTML = "";
      inspectBody.innerHTML = "";

      [0,1,2,3,4].forEach(i => mainHead.appendChild(buildCell("th", val(headerRow, i))));
      [6,7].forEach(i => shipHead.appendChild(buildCell("th", val(headerRow, i))));
      inspectHead.appendChild(buildCell("th", val(headerRow, 9)));

      // Preserve exact row alignment across panels
      const rowCount = Math.max(upperRows.length, 11);

      for (let r = 0; r < rowCount; r++) {
        const row = upperRows[r] ? (upperRows[r].c || []) : [];

        const trMain = document.createElement("tr");
        [0,1,2,3,4].forEach(i => trMain.appendChild(buildCell("td", val(row, i))));
        mainBody.appendChild(trMain);

        const trShip = document.createElement("tr");
        [6,7].forEach(i => trShip.appendChild(buildCell("td", val(row, i))));
        shipBody.appendChild(trShip);

        const trInspect = document.createElement("tr");
        trInspect.appendChild(buildCell("td", val(row, 9)));
        inspectBody.appendChild(trInspect);
      }

      document.getElementById("bulletinTitle").textContent = "BULLETIN";
      const bulletinBox = document.getElementById("bulletinBox");
      bulletinBox.innerHTML = "";

      for (let i = 0; i < 3; i++) {
        const row = bulletinRows[i] ? (bulletinRows[i].c || []) : [];
        const parts = [];
        row.forEach(cell => {
          const text = formatCell(cell);
          if (String(text).trim() !== "") parts.push(text);
        });

        const line = document.createElement("div");
        line.className = "bulletin-line";
        line.textContent = parts.join("   ");
        bulletinBox.appendChild(line);
      }
    }

    window.handleSheetResponse = function(response) {
      clearTimeout(timeoutId);
      isLoading = false;

      if (response && response.status === "ok" && response.table) {
        renderBoard(response.table);
        return;
      }

      let msg = "Could not read sheet data.";
      if (response && response.errors && response.errors.length) {
        msg = response.errors.map(e => e.detailed_message || e.message).join(" | ");
      } else if (response && response.status) {
        msg = "Sheet status: " + response.status;
      }

      document.body.innerHTML = `<div class="error">${msg}</div>`;
    };

    function loadData() {
      if (isLoading) return;
      isLoading = true;

      const oldScript = document.getElementById("sheet-script");
      if (oldScript) oldScript.remove();

      timeoutId = setTimeout(() => {
        isLoading = false;
        document.body.innerHTML = '<div class="error">Sheet load timed out.</div>';
      }, 10000);

      const script = document.createElement("script");
      script.id = "sheet-script";
      script.src =
        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}` +
        `&headers=0&tqx=responseHandler:handleSheetResponse;out:json&t=${Date.now()}`;

      script.onerror = function() {
        clearTimeout(timeoutId);
        isLoading = false;
        document.body.innerHTML = '<div class="error">Error loading sheet.</div>';
      };

      document.body.appendChild(script);
    }

    loadData();
    setInterval(loadData, 15000);
  </script>
</body>
</html>
