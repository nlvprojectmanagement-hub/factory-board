<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* SCALE FOR TV */
#scaleWrapper {
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
}

/* LAYOUT */
.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 90% 10%;
  gap: 6px;
}

.top {
  display: grid;
  grid-template-columns: 64% 20% 16%;
  gap: 8px;
}

.panel {
  background: #000;
}

/* TABLE */
table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid rgba(255,255,255,0.25);
  text-align: center;
  color: #f0a100;
  font-weight: 700;
}

/* HEADERS */
th {
  height: 28px;
  font-size: 14px;
  background: linear-gradient(#7a4700,#140800);
}

/* ROWS */
td {
  height: 28px;
  font-size: 18px;
}

/* CELL CONTENT */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 2px;
  white-space: nowrap;
  overflow: hidden;
}

/* INSPECTION FIX */
.inspect-table td .cell {
  font-size: 15px;
  justify-content: flex-start;
  padding-left: 6px;
}

/* STATUS */
.delay-cell {
  background: #200000;
}

.delay-fill {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: red;
  color: #fff;
  font-weight: 900;
  animation: flashStrong 0.6s infinite;
}

@keyframes flashStrong {
  0% { background:red; }
  50% { background:#300000; }
  100% { background:red; }
}

.ontime-cell {
  background: #00a83a;
  color: #fff;
}

.risk-cell {
  background: #ffbf00;
  color: #000;
}

/* BULLETIN */
.bulletin-wrap {
  display: flex;
  flex-direction: column;
}

.bulletin-title {
  height: 28px;
  background: linear-gradient(#7a4700,#140800);
  color: #f0a100;
  padding-left: 10px;
  display: flex;
  align-items: center;
  font-weight: 700;
}

.bulletin-box {
  flex: 1;
  border: 1px solid rgba(255,255,255,0.25);
}

.bulletin-line {
  border-top: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 16px;
  padding-left: 10px;
  display: flex;
  align-items: center;
  height: 25%;
}
</style>
</head>

<body>

<div id="scaleWrapper">
<div class="screen">

<div class="top">

<div class="panel">
<table class="main-table">
<thead><tr id="mainHead"></tr></thead>
<tbody id="mainBody"></tbody>
</table>
</div>

<div class="panel">
<table>
<thead><tr id="shipHead"></tr></thead>
<tbody id="shipBody"></tbody>
</table>
</div>

<div class="panel">
<table class="inspect-table">
<thead><tr id="inspectHead"></tr></thead>
<tbody id="inspectBody"></tbody>
</table>
</div>

</div>

<div class="bulletin-wrap">
<div class="bulletin-title">BULLETIN</div>
<div class="bulletin-box" id="bulletinBox"></div>
</div>

</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function scale() {
  const scaleX = window.innerWidth / 1920;
  const scaleY = window.innerHeight / 1080;
  const s = Math.min(scaleX, scaleY);
  document.getElementById("scaleWrapper").style.transform = `scale(${s})`;
}
window.addEventListener("resize", scale);
scale();

/* CSV PARSE */
function parseCSV(text){
  return text.split("\n").map(r => r.split(","));
}

function clean(v){
  if(!v) return "";
  const m = v.match(/Date\((\d+),(\d+),(\d+)/);
  if(m) return `${m[3]}-${months[+m[2]]}`;
  return v.trim();
}

function status(v){
  const s = v.toUpperCase().replace(/[\s\-]/g,"");
  if(s.includes("DELAY")) return "delay";
  if(s.includes("ONTIME")) return "ontime";
  return "";
}

function cell(tag, val){
  const el = document.createElement(tag);
  const d = document.createElement("div");
  d.className = "cell";

  const txt = clean(val);
  const st = status(txt);

  if(st === "delay"){
    el.classList.add("delay-cell");
    const fill = document.createElement("div");
    fill.className = "delay-fill";
    fill.textContent = "DELAY";
    el.appendChild(fill);
    return el;
  }

  if(st === "ontime"){
    el.classList.add("ontime-cell");
  }

  d.textContent = txt;
  el.appendChild(d);
  return el;
}

function render(data){
  const mainHead = document.getElementById("mainHead");
  const mainBody = document.getElementById("mainBody");
  const shipHead = document.getElementById("shipHead");
  const shipBody = document.getElementById("shipBody");
  const inspectHead = document.getElementById("inspectHead");
  const inspectBody = document.getElementById("inspectBody");

  mainHead.innerHTML = "";
  mainBody.innerHTML = "";
  shipHead.innerHTML = "";
  shipBody.innerHTML = "";
  inspectHead.innerHTML = "";
  inspectBody.innerHTML = "";

  data[0].slice(0,5).forEach(h => mainHead.appendChild(cell("th",h)));
  [6,7].forEach(i => shipHead.appendChild(cell("th",data[0][i])));
  inspectHead.appendChild(cell("th",data[0][9]));

  data.slice(1).forEach(r => {

    let tr1 = document.createElement("tr");
    for(let i=0;i<5;i++) tr1.appendChild(cell("td", r[i]));
    mainBody.appendChild(tr1);

    let tr2 = document.createElement("tr");
    [6,7].forEach(i => tr2.appendChild(cell("td", r[i])));
    shipBody.appendChild(tr2);

    let tr3 = document.createElement("tr");
    tr3.appendChild(cell("td", r[9]));
    inspectBody.appendChild(tr3);

  });
}

async function load(){
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();
  const data = parseCSV(text);
  render(data);
}

load();
setInterval(load, 8000);
</script>

</body>
</html>
