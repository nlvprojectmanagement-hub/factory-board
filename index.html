<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(255,255,255,.32);
  --gridStrong:rgba(255,122,0,.65);
  --gold:#ff7a00;
  --white:#f5f5f5;

  --incomingBlock:#071016;
  --notesBlock:#0b0b0b;
  --inspectionBlock:#120f16;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:40px 1fr;
  gap:4px;
  padding:4px;
}

/* TOP */
.top{
  display:grid;
  grid-template-columns:150px 1fr 250px;
  gap:4px;
}

.logo,.announcement,.clock{
  border:1px solid var(--grid);
  background:#000;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
}

.announcement{
  display:grid;
  grid-template-columns:145px 1fr;
}

.announcement-label{
  background:#000;
  color:var(--gold);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#fff;
  font-weight:800;
  font-size:11px;

  animation:move 60s linear infinite;
  will-change:transform;
  transform:translate3d(0,0,0);
}

@keyframes move{
  from{transform:translate3d(100%,0,0)}
  to{transform:translate3d(-100%,0,0)}
}

.clock{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.clock-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold);
  font-weight:900;
  font-size:11px;
  border-left:1px solid var(--grid);
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 8fr
    11fr 10fr
    11fr 10fr
    11fr 10fr
    14fr 8fr 9fr;

  grid-template-rows:
    18px
    repeat(18, 18px)
    18px
    repeat(42, 16px);

  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
}

.cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:#000;
  color:#fff;
  font-weight:800;
  font-size:10px;

  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 3px;

  white-space:nowrap;
  overflow:hidden;
}

.header{
  background:#000;
  color:var(--gold);
  font-weight:900;
  font-size:9.5px;
}

.group-start{
  border-left:1px solid var(--gridStrong);
}

.incoming-section{background:var(--incomingBlock)}
.notes-section{background:var(--notesBlock)}
.inspection-section{background:var(--inspectionBlock)}

.left{
  justify-content:flex-start;
  padding-left:6px;
}

/* STATUS */
.delay{
  animation:delayFlash 2.2s infinite;
  color:#fff;
}

@keyframes delayFlash{
  0%{background:#ff0000}
  50%{background:transparent}
  100%{background:#ff0000}
}

.p1{
  background:#ff0000;
  color:#fff;
}

.ontime,.ready{
  background:#00a83a;
}

.p2{
  background:#ffae00;
  color:#000;
}

.pull{
  background:#ffff00;
  color:#000;
}

.pulling{
  background:#00b0f0;
  color:#000;
}

.waiting{
  color:#ccc;
}

.error{
  color:red;
  font-size:22px;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

<div class="top">
  <div class="logo">
    <img src="Picsart_24-07-23_20-35-10-625.png">
  </div>

  <div class="announcement">
    <div class="announcement-label">ANNOUNCEMENTS</div>
    <div class="marquee">
      <div class="marquee-track" id="announceTrack">
        <span></span><span></span>
      </div>
    </div>
  </div>

  <div class="clock">
    <div class="clock-cell" id="dateBox"></div>
    <div class="clock-cell" id="timeBox"></div>
  </div>
</div>

<div class="board" id="board"></div>

</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=3000;

const MAIN_ROWS=18;
const BOTTOM_START_ROW=20;
const BOTTOM_ROWS=42;

let last="";
let first=true;

/* CLOCK */
setInterval(()=>{
  const d=new Date();
  dateBox.textContent=d.toLocaleDateString();
  timeBox.textContent=d.toLocaleTimeString();
},1000);

/* CSV PARSER */
function parseCSV(t){
  const rows=[];
  let r=[],c="",q=false;

  for(let i=0;i<t.length;i++){
    const ch=t[i],nx=t[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){c+='"';i++} else q=!q;
    }
    else if(ch===","&&!q){r.push(c);c="";}
    else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      r.push(c);rows.push(r);r=[];c="";
    } else c+=ch;
  }

  if(c||r.length){r.push(c);rows.push(r);}
  return rows;
}

function clean(v){return (v||"").trim()}

function status(v){
  v=clean(v).toUpperCase();
  if(v.includes("DELAY"))return"delay";
  if(v==="P1")return"p1";
  if(v==="P2")return"p2";
  if(v==="READY")return"ready";
  if(v.includes("ON TIME"))return"ontime";
  if(v==="PULL")return"pull";
  return"";
}

function cell(txt,cls=""){
  const d=document.createElement("div");
  d.className="cell "+cls+" "+status(txt);
  d.textContent=txt||"";
  return d;
}

async function load(){
  const res=await fetch(CSV_URL+"?t="+Date.now());
  const txt=await res.text();

  const data=parseCSV(txt);
  const b=document.getElementById("board");
  b.innerHTML="";

  const header=data[1]||[];

  header.forEach(h=>b.appendChild(cell(h,"header")));

  for(let i=2;i<20;i++){
    const row=data[i]||[];
    for(let j=0;j<12;j++){
      b.appendChild(cell(row[j]));
    }
  }

  /* NOTES */
  b.appendChild(cell("NOTES / IMPORTANT REMARKS","header left"));

  for(let i=0;i<8;i++) b.appendChild(cell(""));

  for(let i=14;i<56;i++){
    const row=data[i]||[];

    b.appendChild(cell(row[0],"left"));

    for(let j=1;j<9;j++) b.appendChild(cell(""));

    b.appendChild(cell(row[8],"left"));
    b.appendChild(cell(row[10]));
    b.appendChild(cell(row[11]));
  }

  /* ANNOUNCEMENTS */
  const txtAnn=(data[0]&&data[0][1])||"";
  const spans=document.querySelectorAll("#announceTrack span");
  spans[0].textContent=txtAnn;
  spans[1].textContent=txtAnn;

  if(!first && txt!==last){}
  first=false;
  last=txt;
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
