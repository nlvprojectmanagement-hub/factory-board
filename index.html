<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
body { margin:0; background:#000; font-family:Arial; color:#fff; overflow:hidden; }

table { width:100%; height:100%; border-collapse:collapse; table-layout:fixed; }
th,td { border:1px solid #333; text-align:center; color:#f0a100; font-weight:700; }

th { background:#2b1700; font-size:12px; }
td { font-size:18px; }

.delay { background:red; color:#fff; animation:flash 0.7s infinite; }
.ontime { background:#00a83a; color:#fff; }

@keyframes flash {
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

#error {
position:absolute;
top:10px;
left:10px;
color:red;
font-size:20px;
z-index:999;
}
</style>
</head>

<body>

<div id="error"></div>

<table>
<thead>
<tr id="head"></tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

function parseCSV(text) {
  return text.split("\n").map(r => r.split(","));
}

function clean(v){
  if(!v) return "";
  v=v.trim();

  // FIX DATE(2026,3,13)
  let m=v.match(/Date\((\d+),(\d+),(\d+)/);
  if(m){
    const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return m[3]+"-"+months[+m[2]];
  }

  return v;
}

function status(v){
  let s=(v||"").toUpperCase().replace(/[\s\-]/g,"");
  if(s.includes("DELAY")) return "delay";
  if(s.includes("ONTIME")) return "ontime";
  return "";
}

function render(rows){

  if(!rows || rows.length<2){
    document.getElementById("error").innerText="NO DATA";
    return;
  }

  document.getElementById("error").innerText="";

  const head=document.getElementById("head");
  const body=document.getElementById("body");

  head.innerHTML="";
  body.innerHTML="";

  // HEADER
  rows[0].slice(0,5).forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    head.appendChild(th);
  });

  // BODY
  rows.slice(1).forEach(r=>{
    let tr=document.createElement("tr");

    for(let i=0;i<5;i++){
      let td=document.createElement("td");
      let val=clean(r[i]);

      let st=status(val);
      if(st==="delay") td.className="delay";
      if(st==="ontime") td.className="ontime";

      td.innerText=val;
      tr.appendChild(td);
    }

    body.appendChild(tr);
  });
}

async function load(){
  try{
    const res=await fetch(url+"?t="+Date.now());
    const text=await res.text();

    if(!text || text.length<10){
      document.getElementById("error").innerText="EMPTY CSV";
      return;
    }

    const rows=parseCSV(text);
    render(rows);

  }catch(e){
    document.getElementById("error").innerText="LOAD ERROR";
  }
}

load();
setInterval(load,8000);

</script>

</body>
</html>
