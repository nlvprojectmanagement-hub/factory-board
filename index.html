<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root{
  --bg:#000;
  --grid:rgba(255,255,255,0.24);
  --text:#f0a100;
  --muted:#cfcfcf;
  --header-grad:linear-gradient(180deg,#7a4700 0%,#2b1700 45%,#110700 100%);
  --panel-grad:linear-gradient(180deg,#101010 0%,#000000 100%);
  --bullet-grad:linear-gradient(180deg,#6a3a00 0%,#180a00 100%);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

body {
  padding: 5px;
  background:
    radial-gradient(circle at top left, rgba(255,166,0,0.09), transparent 28%),
    radial-gradient(circle at top right, rgba(255,166,0,0.04), transparent 22%),
    #000;
}

.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 89% 11%;
  gap: 6px;
}

.top {
  display: grid;
  grid-template-columns: 65% 23% 12%;
  gap: 8px;
  min-height: 0;
}

.panel {
  min-height: 0;
  background: var(--panel-grad);
  box-shadow:
    inset 0 0 0 1px rgba(255,166,0,0.05),
    inset 0 0 25px rgba(255,255,255,0.015);
}

table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid var(--grid);
  text-align: center;
  vertical-align: middle;
  color: var(--text);
  font-weight: 700;
}

th {
  height: 24px;
  padding: 1px 3px;
  font-size: 12px;
  line-height: 1;
  letter-spacing: 0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  background: var(--header-grad);
  border-color: rgba(255,255,255,0.34);
  text-shadow: 0 0 6px rgba(255,166,0,0.16);
}

td {
  height: 24px;
  padding: 0;
  font-size: 17px;
  background: rgba(0,0,0,0.82);
}

.cell-inner {
  width: 100%;
  height: 100%;
  min-height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1px 3px;
  color: inherit;
  background: transparent;
  font-size: 17px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  text-align: center;
}

/* Main panel widths */
.main-table col:nth-child(1) { width: 19%; }
.main-table col:nth-child(2) { width: 16%; }
.main-table col:nth-child(3) { width: 22%; }
.main-table col:nth-child(4) { width: 21%; }
.main-table col:nth-child(5) { width: 22%; }

/* Ship panel */
.ship-table col:nth-child(1) { width: 64%; }
.ship-table col:nth-child(2) { width: 36%; }

/* Inspect panel */
.inspect-table col:nth-child(1) { width: 100%; }

/* Bulletin */
.bulletin-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.bulletin-title {
  height: 24px;
  padding: 1px 10px;
  border: 1px solid rgba(255,255,255,0.34);
  border-bottom: none;
  background: var(--bullet-grad);
  color: var(--text);
  font-size: 16px;
  display: flex;
  align-items: center;
  font-weight: 700;
  text-shadow: 0 0 6px rgba(255,166,0,0.16);
}

.bulletin-box {
  flex: 1;
  min-height: 0;
  border: 1px solid var(--grid);
  display: grid;
  grid-template-rows: repeat(4, 1fr);
  background: rgba(0,0,0,0.82);
}

.bulletin-line {
  border-top: 1px solid var(--grid);
  padding: 1px 8px;
  font-size: 13px;
  color: #fff;
  display: flex;
  align-items: center;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
}

.bulletin-line:first-child {
  border-top: none;
}

/* Statuses */
.delay-cell {
  background: #250000 !important;
}

.delay-fill {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ff0000;
  color: #fff;
  font-weight: 800;
  text-shadow: 0 0 8px rgba(255,255,255,0.8);
  animation: flashDelay 0.75s linear infinite;
}

.ontime-cell {
  background: #00a83a !important;
  color: #fff !important;
}

.risk-cell {
  background: #ffbf00 !important;
  color: #000 !important;
}

@keyframes flashDelay {
  0%   { background:#ff0000; color:#ffffff; opacity:1; }
  50%  { background:#2e0000; color:#ff6b6b; opacity:0.35; }
  100% { background:#ff0000; color:#ffffff; opacity:1; }
}

.muted {
  color: var(--muted) !important;
}

.error {
  color: red;
  font-size: 22px;
  padding: 20px;
  font-weight: 700;
}
</style>
</head>

<body>
<div class="screen">

  <div class="top">

    <div class="panel">
      <table class="main-table">
        <colgroup><col><col><col><col><col></colgroup>
        <thead><tr id="mainHead"></tr></thead>
        <tbody id="mainBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <table class="ship-table">
        <colgroup><col><col></colgroup>
        <thead><tr id="shipHead"></tr></thead>
        <tbody id="shipBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <table class="inspect-table">
        <colgroup><col></colgroup>
        <thead><tr id="inspectHead"></tr></thead>
        <tbody id="inspectBody"></tbody>
      </table>
    </div>

  </div>

  <div class="bulletin-wrap">
    <div class="bulletin-title">BULLETIN</div>
    <div class="bulletin-box" id="bulletinBox"></div>
  </div>

</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

const REFRESH_MS = 8000;
const STABLE_POLLS_REQUIRED = 2;

let isLoading = false;
let lastAppliedSnapshot = "";
let pendingSnapshot = "";
let pendingRows = null;
let pendingCount = 0;

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function safe(row, idx) {
  return (row && row[idx] !== undefined) ? String(row[idx]).trim() : "";
}

function formatValue(value) {
  const v = String(value || "").trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/i);
  if (!m) return v;
  return `${m[3]}-${monthNames[+m[2]]}`;
}

function getStatus(value) {
  const raw = String(value || "");
  const normalized = raw.toUpperCase().replace(/[\s\-]+/g, "");

  if (normalized.includes("DELAY")) return "delay";
  if (normalized.includes("ONTIME")) return "ontime";
  if (normalized.includes("RISK")) return "risk";

  return "";
}

function isMuted(value) {
  const v = String(value || "").trim().toUpperCase();
  return v === "N/A" || v === "-";
}

function crop(text, maxChars) {
  const t = String(text || "").trim();
  if (t.length <= maxChars) return t;
  return t.slice(0, maxChars);
}

function makeCell(tag, value, maxChars = 28) {
  const raw = String(value || "").trim();
  const text = crop(formatValue(raw), maxChars);
  const status = getStatus(raw);

  const el = document.createElement(tag);
  const inner = document.createElement("div");
  inner.className = "cell-inner";

  if (status === "delay") {
    el.classList.add("delay-cell");
    inner.classList.add("delay-fill");
  }
  if (status === "ontime") {
    el.classList.add("ontime-cell");
  }
  if (status === "risk") {
    el.classList.add("risk-cell");
  }
  if (!status && isMuted(text)) {
    inner.classList.add("muted");
  }

  inner.textContent = text;
  el.appendChild(inner);
  return el;
}

function render(rows) {
  if (!rows.length) {
    document.body.innerHTML = '<div class="error">No sheet data found.</div>';
    return;
  }

  const header = rows[0] || [];
  const dataRows = rows.slice(1);

  const bulletinIndex = dataRows.findIndex(r => safe(r, 0).toUpperCase() === "BULLETIN");
  const upperRows = bulletinIndex >= 0 ? dataRows.slice(0, bulletinIndex) : dataRows;
  const bulletinRows = bulletinIndex >= 0 ? dataRows.slice(bulletinIndex + 1, bulletinIndex + 5) : [];

  const mainHead = document.getElementById("mainHead");
  const shipHead = document.getElementById("shipHead");
  const inspectHead = document.getElementById("inspectHead");
  const mainBody = document.getElementById("mainBody");
  const shipBody = document.getElementById("shipBody");
  const inspectBody = document.getElementById("inspectBody");

  mainHead.innerHTML = "";
  shipHead.innerHTML = "";
  inspectHead.innerHTML = "";
  mainBody.innerHTML = "";
  shipBody.innerHTML = "";
  inspectBody.innerHTML = "";

  [0,1,2,3,4].forEach(i => mainHead.appendChild(makeCell("th", safe(header, i), 24)));
  [6,7].forEach(i => shipHead.appendChild(makeCell("th", safe(header, i), 18)));
  inspectHead.appendChild(makeCell("th", safe(header, 9), 14)));

  const rowCount = Math.max(upperRows.length, 20);

  for (let r = 0; r < rowCount; r++) {
    const row = upperRows[r] || [];

    const trMain = document.createElement("tr");
    [0,1,2,3,4].forEach(i => trMain.appendChild(makeCell("td", safe(row, i), 28)));
    mainBody.appendChild(trMain);

    const trShip = document.createElement("tr");
    [6,7].forEach(i => trShip.appendChild(makeCell("td", safe(row, i), 20)));
    shipBody.appendChild(trShip);

    const trInspect = document.createElement("tr");
    trInspect.appendChild(makeCell("td", safe(row, 9), 14));
    inspectBody.appendChild(trInspect);
  }

  const bulletinBox = document.getElementById("bulletinBox");
  bulletinBox.innerHTML = "";

  for (let i = 0; i < 4; i++) {
    const row = bulletinRows[i] || [];
    const parts = row
      .map(v => crop(formatValue(v), 80))
      .filter(v => String(v).trim() !== "");

    const line = document.createElement("div");
    line.className = "bulletin-line";
    line.textContent = parts.join("   ");
    bulletinBox.appendChild(line);
  }
}

function maybeApply(rows, snapshot) {
  if (!lastAppliedSnapshot) {
    render(rows);
    lastAppliedSnapshot = snapshot;
    pendingSnapshot = "";
    pendingRows = null;
    pendingCount = 0;
    return;
  }

  if (snapshot === lastAppliedSnapshot) {
    pendingSnapshot = "";
    pendingRows = null;
    pendingCount = 0;
    return;
  }

  if (snapshot !== pendingSnapshot) {
    pendingSnapshot = snapshot;
    pendingRows = rows;
    pendingCount = 1;
    return;
  }

  pendingCount += 1;

  if (pendingCount >= STABLE_POLLS_REQUIRED) {
    render(pendingRows);
    lastAppliedSnapshot = pendingSnapshot;
    pendingSnapshot = "";
    pendingRows = null;
    pendingCount = 0;
  }
}

async function load() {
  if (isLoading) return;
  isLoading = true;

  try {
    const res = await fetch(csvUrl + "&t=" + Date.now(), { cache: "no-store" });
    const text = await res.text();
    const rows = parseCSV(text);
    const snapshot = JSON.stringify(rows);
    maybeApply(rows, snapshot);
  } catch (e) {
    document.body.innerHTML = '<div class="error">Error loading</div>';
  }

  isLoading = false;
}

load();
setInterval(load, REFRESH_MS);
</script>

</body>
</html>
