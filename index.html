<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Factory Board</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    #board {
      width: 100%;
      min-height: 100vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #888;
      padding: 12px;
      text-align: center;
      color: #ff9d00;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delay {
      color: white;
      background: red;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { background: red; color: white; }
      50% { background: black; color: red; }
      100% { background: red; color: white; }
    }
  </style>
</head>
<body>
  <div id="board">Loading...</div>

  <script>
    const sheetId = "1ML2ozfDmFhVqVetf0zNlrJRfnvfQZ_xrUP-gLN80XQ8";
    const gid = "0";
    let lastRendered = "";

    function renderTable(table) {
      const cols = table.cols || [];
      const rows = table.rows || [];

      let html = "<table><tr>";
      cols.forEach(col => {
        html += `<th>${col.label || ""}</th>`;
      });
      html += "</tr>";

      rows.forEach(row => {
        html += "<tr>";
        (row.c || []).forEach(cell => {
          const value = cell && cell.v != null ? String(cell.v) : "";
          const cls = value.trim().toUpperCase() === "DELAY" ? "delay" : "";
          html += `<td class="${cls}">${value}</td>`;
        });
        html += "</tr>";
      });

      html += "</table>";

      if (html !== lastRendered) {
        document.getElementById("board").innerHTML = html;
        lastRendered = html;
      }
    }

    function handleSheetResponse(response) {
      if (response && response.table) {
        renderTable(response.table);
      }
    }

    function loadData() {
      const oldScript = document.getElementById("sheet-script");
      if (oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "sheet-script";
      script.src =
        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}` +
        `&tqx=responseHandler:handleSheetResponse;out:json&t=${Date.now()}`;
      document.body.appendChild(script);
    }

    loadData();
    setInterval(loadData, 10000);
  </script>
</body>
</html>
