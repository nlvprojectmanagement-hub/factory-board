<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#000;
  --panel:#03060a;
  --panel2:#06101a;
  --line:rgba(90,170,255,.42);
  --line2:rgba(120,200,255,.72);
  --orange:#ffb000;
  --white:#f5fbff;
  --muted:#b8c0c8;
  --header:linear-gradient(180deg,#7a4600 0%,#301900 58%,#080300 100%);
  --blueGlow:0 0 14px rgba(60,150,255,.20);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:44px 1fr 126px;
  gap:4px;
  padding:4px;
  background:
    radial-gradient(circle at top left,rgba(0,120,255,.12),transparent 30%),
    radial-gradient(circle at bottom right,rgba(255,160,0,.06),transparent 24%),
    #000;
}

/* TOP */
.top-row{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:4px;
  min-height:0;
}

.logo-box{
  border:1px solid var(--line);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:var(--blueGlow);
}

.logo-box img{
  max-height:38px;
  max-width:100%;
  object-fit:contain;
}

.announcement-bar{
  border:1px solid var(--line);
  background:#000;
  display:grid;
  grid-template-columns:155px 1fr;
  overflow:hidden;
  box-shadow:var(--blueGlow);
}

.bar-label{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:2px solid var(--line2);
  white-space:nowrap;
  letter-spacing:.4px;
}

.marquee{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  min-width:0;
}

.marquee-track{
  display:inline-flex;
  align-items:center;
  gap:80px;
  white-space:nowrap;
  color:#fff;
  font-size:14px;
  font-weight:800;
  animation:marqueeMove 35s linear infinite;
}

.marquee-track span{white-space:nowrap}

@keyframes marqueeMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* MAIN */
.main-area{
  display:grid;
  grid-template-columns:4.25fr 1.75fr 2.7fr !important;
  gap:8px;
  min-height:0;
  overflow:hidden;
}

.panel{
  min-height:0;
  overflow:hidden;
  background:linear-gradient(180deg,#05080d,#000);
  border:1px solid var(--line);
  box-shadow:var(--blueGlow);
}

/* Regular tables */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid var(--line);
  text-align:center;
  vertical-align:middle;
  font-weight:800;
}

th{
  height:20px;
  background:var(--header);
  color:var(--orange);
  border-color:var(--line2);
  font-size:11px;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
  letter-spacing:.15px;
}

td{
  height:18px;
  background:#000;
  color:var(--white);
  font-size:12px;
  padding:0;
}

.cell{
  width:100%;
  height:100%;
  min-height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
  color:inherit;
  position:relative;
}

.cell.left{
  justify-content:flex-start;
  padding-left:5px;
  font-size:10.5px;
}

.cell-inner{
  white-space:nowrap;
}

.cell.long .cell-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

@keyframes cellScroll{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

/* SPLIT PANEL FOR INCOMING SHIPMENTS + DATE */
.split-panel{
  display:grid;
  grid-template-columns:1.35fr .75fr;
  gap:7px;
  background:transparent;
  border:none;
  box-shadow:none;
}

.mini-panel{
  border:1px solid var(--line2);
  background:linear-gradient(180deg,#06101a,#000);
  box-shadow:0 0 16px rgba(60,150,255,.18);
  overflow:hidden;
}

.mini-panel th{
  background:linear-gradient(180deg,#8a5200 0%,#351b00 62%,#090400 100%);
  border-bottom:2px solid var(--line2);
  color:#ffbf2e;
  font-size:11px;
}

.mini-panel td{
  background:rgba(0,25,50,.16);
}

/* INSPECTION MORE READABLE */
.inspection-panel td .cell{
  justify-content:flex-start;
  padding-left:6px;
  font-size:10.5px;
}

/* STATUS */
.delay-cell{background:#240000!important}

.delay-fill{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ff0000;
  color:#fff;
  font-weight:900;
  animation:flashDelay .65s linear infinite;
  text-shadow:0 0 8px rgba(255,255,255,.65);
}

@keyframes flashDelay{
  0%{background:#ff0000}
  50%{background:#2a0000}
  100%{background:#ff0000}
}

.ontime-cell{
  background:#00a83a!important;
  color:#fff!important;
}

.risk-cell{
  background:#ffbf00!important;
  color:#000!important;
}

.muted{color:var(--muted)!important}

/* NOTES */
.notes-panel{
  border:1px solid var(--line);
  background:#000;
  overflow:hidden;
  display:grid;
  grid-template-rows:22px 1fr;
  box-shadow:var(--blueGlow);
}

.notes-title{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  padding-left:10px;
  border-bottom:1px solid var(--line2);
  letter-spacing:.4px;
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:17px;
  overflow:hidden;
  height:100%;
}

.note-cell{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  color:#fff;
  background:#000;
  font-size:12px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:1px 6px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
}

.note-cell:nth-child(2n){border-right:none}

.note-inner{white-space:nowrap}

.note-cell.long .note-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

.error{
  color:red;
  font-size:22px;
  font-weight:800;
  padding:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top-row">
    <div class="logo-box">
      <img src="Picsart_24-07-23_20-35-10-625.png" alt="Company Logo">
    </div>

    <div class="announcement-bar">
      <div class="bar-label" id="announcementLabel">ANNOUNCEMENT</div>
      <div class="marquee">
        <div class="marquee-track" id="announcementTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-area" id="mainArea"></div>

  <div class="notes-panel">
    <div class="notes-title">NOTES</div>
    <div class="notes-grid" id="notesGrid"></div>
  </div>

</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=8000;
const EXTRA_BLANK_ROWS=1;
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows=[];
  let row=[];
  let cell="";
  let q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i];
    const nx=text[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){
        cell+='"';
        i++;
      }else{
        q=!q;
      }
    }else if(ch===","&&!q){
      row.push(cell);
      cell="";
    }else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      row.push(cell);
      rows.push(row);
      row=[];
      cell="";
    }else{
      cell+=ch;
    }
  }

  if(cell.length||row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function clean(v){
  if(v==null)return "";
  const s=String(v).trim();
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m)return `${m[3]}-${MONTHS[+m[2]]}`;
  return s;
}

function norm(v){
  return clean(v).toUpperCase().replace(/[\s\-]+/g,"");
}

function getStatus(v){
  const s=norm(v);
  if(s.includes("DELAY"))return"delay";
  if(s.includes("ONTIME"))return"ontime";
  if(s.includes("RISK"))return"risk";
  return"";
}

function isMuted(v){
  const s=clean(v).toUpperCase();
  return s==="N/A"||s==="-";
}

function findRowByWords(rows,words){
  return rows.findIndex(r=>{
    return r.some(c=>{
      const v=clean(c).toUpperCase();
      return words.some(w=>v===w || v.includes(w));
    });
  });
}

function detectSections(header){
  const sections=[];
  let start=null;

  for(let i=0;i<=header.length;i++){
    const filled=i<header.length&&clean(header[i])!=="";

    if(filled&&start===null)start=i;

    if((!filled||i===header.length)&&start!==null){
      sections.push({
        start:start,
        end:i-1,
        title:clean(header[start])
      });
      start=null;
    }
  }

  return sections;
}

function makeCell(tag,val,left=false){
  const raw=String(val||"").trim();
  const txt=clean(raw);
  const st=getStatus(raw);
  const el=document.createElement(tag);

  if(st==="delay"){
    el.classList.add("delay-cell");
    const d=document.createElement("div");
    d.className="delay-fill";
    d.textContent=txt;
    el.appendChild(d);
    return el;
  }

  if(st==="ontime")el.classList.add("ontime-cell");
  if(st==="risk")el.classList.add("risk-cell");

  const d=document.createElement("div");
  d.className="cell"+(left?" left":"");

  const inner=document.createElement("span");
  inner.className="cell-inner";
  inner.textContent=txt;

  if(!st&&isMuted(txt))d.classList.add("muted");

  d.appendChild(inner);
  el.appendChild(d);

  requestAnimationFrame(()=>{
    if(inner.scrollWidth > d.clientWidth){
      d.classList.add("long");
    }
  });

  return el;
}

function rowHasData(row,sec){
  for(let c=sec.start;c<=sec.end;c++){
    if(clean(row[c])!=="")return true;
  }
  return false;
}

function renderSingleColumnPanel(colIndex,header,rows,left=false){
  const panel=document.createElement("div");
  panel.className="mini-panel";

  const table=document.createElement("table");
  const thead=document.createElement("thead");
  const tbody=document.createElement("tbody");
  const trh=document.createElement("tr");

  trh.appendChild(makeCell("th",header[colIndex],left));
  thead.appendChild(trh);
  table.appendChild(thead);

  const visible=rows.filter(r=>clean(r[colIndex])!=="");
  const maxRows=Math.max(rows.length, visible.length + EXTRA_BLANK_ROWS);

  for(let r=0;r<maxRows;r++){
    const row=rows[r]||[];
    const tr=document.createElement("tr");
    tr.appendChild(makeCell("td",row[colIndex],left));
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  panel.appendChild(table);
  return panel;
}

function renderSplitPanel(section,header,rows){
  const panel=document.createElement("div");
  panel.className="split-panel";

  for(let c=section.start;c<=section.end;c++){
    panel.appendChild(renderSingleColumnPanel(c,header,rows,false));
  }

  return panel;
}

function renderTable(section,header,rows,left=false,extraClass=""){
  const panel=document.createElement("div");
  panel.className=("panel "+extraClass).trim();

  const table=document.createElement("table");
  const thead=document.createElement("thead");
  const tbody=document.createElement("tbody");
  const trh=document.createElement("tr");

  for(let c=section.start;c<=section.end;c++){
    trh.appendChild(makeCell("th",header[c],left));
  }

  thead.appendChild(trh);
  table.appendChild(thead);

  const visible=rows.filter(r=>rowHasData(r,section));
  const count=visible.length+EXTRA_BLANK_ROWS;

  for(let r=0;r<count;r++){
    const row=visible[r]||[];
    const tr=document.createElement("tr");

    for(let c=section.start;c<=section.end;c++){
      tr.appendChild(makeCell("td",row[c],left));
    }

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  panel.appendChild(table);
  return panel;
}

function rowValues(row,start,end){
  const vals=[];
  for(let c=start;c<=end;c++){
    vals.push(clean(row[c]));
  }
  return vals;
}

function setAnnouncement(label,text){
  document.getElementById("announcementLabel").textContent=label || "ANNOUNCEMENT";
  const finalText=text && text.trim() ? text : " ";
  const spans=document.querySelectorAll("#announcementTrack span");
  spans[0].textContent=finalText;
  spans[1].textContent=finalText;
}

function makeNoteCell(text){
  const cell=document.createElement("div");
  cell.className="note-cell";

  const inner=document.createElement("div");
  inner.className="note-inner";
  inner.textContent=text || "";

  cell.appendChild(inner);

  requestAnimationFrame(()=>{
    if(inner.scrollWidth > cell.clientWidth){
      cell.classList.add("long");
    }
  });

  return cell;
}

function renderNotes(rows){
  const grid=document.getElementById("notesGrid");
  grid.innerHTML="";

  rows.forEach(row=>{
    const left=clean(row[0]);
    const right=clean(row[6]);
    grid.appendChild(makeNoteCell(left));
    grid.appendChild(makeNoteCell(right));
  });
}

function render(data){
  if(!data||data.length<2){
    document.body.innerHTML='<div class="error">NO DATA</div>';
    return;
  }

  const main=document.getElementById("mainArea");
  main.innerHTML="";

  const announcementRow=findRowByWords(data,["ANNOUNCEMENT","ANOUNCEMENT","BULLETIN"]);
  const salesRow=findRowByWords(data,["SALES ORDER"]);
  const notesRow=findRowByWords(data,["NOTES"]);

  if(announcementRow>=0){
    const label=clean(data[announcementRow][0]);
    const text=rowValues(data[announcementRow],1,11).filter(Boolean).join("     •     ");
    setAnnouncement(label,text);
  }else{
    setAnnouncement("ANNOUNCEMENT","");
  }

  if(notesRow>=0){
    renderNotes(data.slice(notesRow+1));
  }else{
    renderNotes([]);
  }

  if(salesRow<0){
    main.innerHTML='<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header=data[salesRow];
  const tableEnd=notesRow>salesRow?notesRow:data.length;
  const rows=data.slice(salesRow+1,tableEnd);
  const sections=detectSections(header);

  main.style.gridTemplateColumns="4.25fr 1.75fr 2.7fr";

  sections.forEach((section,index)=>{
    const title=String(section.title||"").toUpperCase();

    if(title.includes("INCOMING")){
      main.appendChild(renderSplitPanel(section,header,rows));
    }else if(title.includes("INSPECTION")){
      main.appendChild(renderTable(section,header,rows,true,"inspection-panel"));
    }else{
      main.appendChild(renderTable(section,header,rows,false,""));
    }
  });
}

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    const text=await res.text();
    render(parseCSV(text));
  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
