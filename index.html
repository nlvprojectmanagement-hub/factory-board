<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(255,255,255,.22);
  --grid2:rgba(255,255,255,.34);
  --orange:#f0a100;
  --white:#fff;
  --muted:#bdbdbd;
  --head:linear-gradient(180deg,#7a4700 0%,#2b1700 55%,#120700 100%);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:58px 1fr 64px;
  gap:6px;
  padding:6px;
  background:#000;
}

/* TOP */
.top-row{
  display:grid;
  grid-template-columns:190px 1fr;
  gap:6px;
  min-height:0;
}

.logo-box{
  border:1px solid var(--grid);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo-box img{
  max-height:52px;
  max-width:100%;
  object-fit:contain;
}

/* BULLETIN + NOTES MOVING BAR */
.moving-bar{
  border:1px solid var(--grid);
  background:#000;
  display:grid;
  grid-template-columns:170px 1fr;
  min-width:0;
  overflow:hidden;
}

.bar-label{
  background:var(--head);
  color:var(--orange);
  font-size:22px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--grid2);
}

.marquee{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  min-width:0;
}

.marquee-track{
  display:inline-flex;
  align-items:center;
  gap:70px;
  white-space:nowrap;
  color:#fff;
  font-size:22px;
  font-weight:800;
  animation:marqueeMove 28s linear infinite;
  will-change:transform;
}

.notes-bar .marquee-track{
  animation-duration:38s;
}

.marquee-track span{
  white-space:nowrap;
}

@keyframes marqueeMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* MAIN */
.main-area{
  display:grid;
  gap:6px;
  min-height:0;
  overflow:hidden;
}

.panel{
  min-height:0;
  overflow:hidden;
  background:#000;
  border:1px solid var(--grid);
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:auto;
}

th,td{
  border:1px solid var(--grid);
  text-align:center;
  vertical-align:middle;
  font-weight:800;
}

th{
  height:28px;
  background:var(--head);
  color:var(--orange);
  border-color:var(--grid2);
  font-size:clamp(11px,.85vw,15px);
  padding:2px 5px;
  white-space:nowrap;
  overflow:hidden;
}

td{
  height:26px;
  background:#000;
  color:var(--white);
  font-size:clamp(11px,.95vw,16px);
  padding:0;
}

.cell{
  width:100%;
  height:100%;
  min-height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2px 5px;
  white-space:nowrap;
  overflow:hidden;
  color:inherit;
}

.cell.left{
  justify-content:flex-start;
  padding-left:6px;
}

/* STATUS */
.delay-cell{
  background:#240000!important;
}

.delay-fill{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ff0000;
  color:#fff;
  font-weight:900;
  animation:flashDelay .65s linear infinite;
}

@keyframes flashDelay{
  0%{background:#ff0000}
  50%{background:#320000}
  100%{background:#ff0000}
}

.ontime-cell{
  background:#00a83a!important;
  color:#fff!important;
}

.risk-cell{
  background:#ffbf00!important;
  color:#000!important;
}

.muted{
  color:var(--muted)!important;
}

.error{
  color:red;
  font-size:22px;
  font-weight:800;
  padding:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top-row">
    <div class="logo-box">
      <img src="Picsart_24-07-23_20-35-10-625.png" alt="Company Logo">
    </div>

    <div class="moving-bar">
      <div class="bar-label">BULLETIN</div>
      <div class="marquee">
        <div class="marquee-track" id="bulletinTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-area" id="mainArea"></div>

  <div class="moving-bar notes-bar">
    <div class="bar-label">NOTES</div>
    <div class="marquee">
      <div class="marquee-track" id="notesTrack">
        <span></span><span></span>
      </div>
    </div>
  </div>

</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=8000;
const EXTRA_BLANK_ROWS=1;
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows=[];
  let row=[];
  let cell="";
  let q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i];
    const nx=text[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){
        cell+='"';
        i++;
      }else{
        q=!q;
      }
    }else if(ch===","&&!q){
      row.push(cell);
      cell="";
    }else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      row.push(cell);
      rows.push(row);
      row=[];
      cell="";
    }else{
      cell+=ch;
    }
  }

  if(cell.length||row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function clean(v){
  if(v==null)return "";
  const s=String(v).trim();
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m)return `${m[3]}-${MONTHS[+m[2]]}`;
  return s;
}

function norm(v){
  return clean(v).toUpperCase().replace(/[\s\-]+/g,"");
}

function getStatus(v){
  const s=norm(v);
  if(s.includes("DELAY"))return"delay";
  if(s.includes("ONTIME"))return"ontime";
  if(s.includes("RISK"))return"risk";
  return"";
}

function isMuted(v){
  const s=clean(v).toUpperCase();
  return s==="N/A"||s==="-";
}

function findRow(rows,word){
  const w=word.toUpperCase();
  return rows.findIndex(r=>r.some(c=>clean(c).toUpperCase()===w));
}

function detectSections(header){
  const sections=[];
  let start=null;

  for(let i=0;i<=header.length;i++){
    const filled=i<header.length&&clean(header[i])!=="";

    if(filled&&start===null)start=i;

    if((!filled||i===header.length)&&start!==null){
      sections.push({
        start:start,
        end:i-1,
        title:clean(header[start])
      });
      start=null;
    }
  }

  return sections;
}

function makeCell(tag,val,left=false){
  const raw=String(val||"").trim();
  const txt=clean(raw);
  const st=getStatus(raw);
  const el=document.createElement(tag);

  if(st==="delay"){
    el.classList.add("delay-cell");
    const d=document.createElement("div");
    d.className="delay-fill";
    d.textContent=txt;
    el.appendChild(d);
    return el;
  }

  if(st==="ontime")el.classList.add("ontime-cell");
  if(st==="risk")el.classList.add("risk-cell");

  const d=document.createElement("div");
  d.className="cell"+(left?" left":"");
  if(!st&&isMuted(txt))d.classList.add("muted");
  d.textContent=txt;
  el.appendChild(d);
  return el;
}

function rowHasData(row,sec){
  for(let c=sec.start;c<=sec.end;c++){
    if(clean(row[c])!=="")return true;
  }
  return false;
}

function renderTable(section,header,rows,left=false){
  const panel=document.createElement("div");
  panel.className="panel";

  const table=document.createElement("table");
  const thead=document.createElement("thead");
  const tbody=document.createElement("tbody");
  const trh=document.createElement("tr");

  for(let c=section.start;c<=section.end;c++){
    trh.appendChild(makeCell("th",header[c],left));
  }

  thead.appendChild(trh);
  table.appendChild(thead);

  const visible=rows.filter(r=>rowHasData(r,section));
  const count=visible.length+EXTRA_BLANK_ROWS;

  for(let r=0;r<count;r++){
    const row=visible[r]||[];
    const tr=document.createElement("tr");

    for(let c=section.start;c<=section.end;c++){
      tr.appendChild(makeCell("td",row[c],left));
    }

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  panel.appendChild(table);
  return panel;
}

function collectRow(row,start,end){
  const parts=[];
  for(let c=start;c<=end;c++){
    const v=clean(row[c]);
    if(v)parts.push(v);
  }
  return parts.join("     •     ");
}

function collectRows(rows,start,end){
  return rows.map(r=>collectRow(r,start,end)).filter(Boolean).join("     •     ");
}

function setMarquee(trackId,text){
  const track=document.getElementById(trackId);
  const finalText=text && text.trim() ? text : " ";
  const spans=track.querySelectorAll("span");
  spans[0].textContent=finalText;
  spans[1].textContent=finalText;
}

function render(data){
  if(!data||data.length<2){
    document.body.innerHTML='<div class="error">NO DATA</div>';
    return;
  }

  const main=document.getElementById("mainArea");
  main.innerHTML="";

  const bulletinRow=findRow(data,"BULLETIN");
  const salesRow=findRow(data,"SALES ORDER");
  const notesRow=findRow(data,"NOTES");

  /* BULLETIN: same row, A:L. Label is A, text starts B. */
  if(bulletinRow>=0){
    setMarquee("bulletinTrack",collectRow(data[bulletinRow],1,11));
  }else{
    setMarquee("bulletinTrack","");
  }

  /* NOTES: all rows below NOTES, A:L */
  if(notesRow>=0){
    setMarquee("notesTrack",collectRows(data.slice(notesRow+1),0,11));
  }else{
    setMarquee("notesTrack","");
  }

  if(salesRow<0){
    main.innerHTML='<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header=data[salesRow];
  const tableEnd=notesRow>salesRow?notesRow:data.length;
  const rows=data.slice(salesRow+1,tableEnd);
  const sections=detectSections(header);

  if(sections.length>0){
    main.style.gridTemplateColumns=sections.map((s,i)=>i===0?"4fr":"1.6fr").join(" ");
  }

  sections.forEach((section,index)=>{
    main.appendChild(renderTable(section,header,rows,index>=2));
  });
}

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    const text=await res.text();
    render(parseCSV(text));
  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
