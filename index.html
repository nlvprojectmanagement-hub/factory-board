<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:40px 1fr;
}

/* TOP */
.top{
  display:grid;
  grid-template-columns:150px 1fr 250px;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
}

.announcement{
  display:grid;
  grid-template-columns:150px 1fr;
}

.announcement-label{
  background:#111;
  color:#ffae00;
  font-weight:900;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:flex;
  gap:80px;
  white-space:nowrap;
  color:#fff;
  font-size:12px;
  animation:scroll 35s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.clock{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.clock div{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffae00;
  font-weight:900;
  font-size:12px;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
  7fr 7fr 8fr
  11fr 10fr
  11fr 10fr
  11fr 10fr
  14fr 8fr 9fr;

  grid-template-rows:
  22px
  repeat(16, 28px)
  22px
  repeat(30, 22px);

  height:100%;
}

/* CELL */
.cell{
  border:1px solid rgba(255,255,255,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#fff;
  font-weight:700;
  overflow:hidden;
  white-space:nowrap;
}

/* HEADER */
.header{
  background:#111;
  color:#ffae00;
  font-weight:900;
}

/* LEFT ALIGN */
.left{
  justify-content:flex-start;
  padding-left:6px;
}

/* STATUS */
.ontime{background:#00a83a}
.ready{background:#00a83a}
.p2{background:#ffae00;color:#000}
.pull{background:#ffff00;color:#000}

/* P1 solid */
.p1{
  background:#ff0000;
  color:#fff;
}

/* DELAY FLASH SIMPLE */
.delay{
  animation:flash 1s infinite;
}

@keyframes flash{
  0%{background:#ff0000}
  50%{background:#000}
  100%{background:#ff0000}
}

</style>
</head>

<body>

<div class="screen">

<div class="top">
  <div class="logo">
    <img src="Picsart_24-07-23_20-35-10-625.png">
  </div>

  <div class="announcement">
    <div class="announcement-label" id="label">ANNOUNCMENTS</div>
    <div class="marquee">
      <div class="marquee-track" id="announce">
        <span></span><span></span>
      </div>
    </div>
  </div>

  <div class="clock">
    <div id="date"></div>
    <div id="time"></div>
  </div>
</div>

<div class="board" id="board"></div>

</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

let last="";
let first=true;

/* SOUND */
let ctx=null, unlocked=false;

document.body.onclick=()=>{
  if(!unlocked){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    unlocked=true;
  }
};

function beep(){
  if(!unlocked)return;

  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.frequency.value=900;
  g.gain.value=0.1;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.2);
}

/* CLOCK */
setInterval(()=>{
  const d=new Date();
  document.getElementById("date").textContent=d.toLocaleDateString();
  document.getElementById("time").textContent=d.toLocaleTimeString();
},1000);

/* CSV PARSE */
function parse(t){
  return t.split("\n").map(r=>r.split(","));
}

function cls(v){
  v=(v||"").toUpperCase();
  if(v.includes("DELAY"))return"delay";
  if(v==="P1")return"p1";
  if(v==="P2")return"p2";
  if(v==="READY")return"ready";
  if(v.includes("ON TIME"))return"ontime";
  if(v==="PULL")return"pull";
  return"";
}

function cell(t,c=""){
  const d=document.createElement("div");
  d.className="cell "+c+" "+cls(t);
  d.textContent=t||"";
  return d;
}

async function load(){
  const r=await fetch(CSV+"?t="+Date.now());
  const t=await r.text();

  if(!first && t!==last) beep();
  first=false;
  last=t;

  const data=parse(t);
  const b=document.getElementById("board");
  b.innerHTML="";

  const header=data[1];

  header.forEach(h=>{
    b.appendChild(cell(h,"header"));
  });

  for(let i=2;i<18;i++){
    const row=data[i]||[];
    for(let j=0;j<12;j++){
      b.appendChild(cell(row[j]));
    }
  }

  /* NOTES */
  b.appendChild(cell("NOTES / IMPORTANT REMARKS","header left"));
  for(let i=0;i<8;i++){
    b.appendChild(cell(""));
  }

  for(let i=14;i<44;i++){
    const row=data[i]||[];
    b.appendChild(cell(row[0],"left"));
    for(let j=1;j<9;j++){
      b.appendChild(cell(""));
    }
    b.appendChild(cell(row[8],"left"));
    b.appendChild(cell(row[10]));
    b.appendChild(cell(row[11]));
  }

  /* ANNOUNCEMENT TEXT */
  const txt=data[0][1]||"";
  document.getElementById("announce").children[0].textContent=txt;
  document.getElementById("announce").children[1].textContent=txt;
}

load();
setInterval(load,8000);

</script>

</body>
</html>
