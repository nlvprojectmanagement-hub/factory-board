<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}
#error{
  position:fixed;
  top:8px;
  left:8px;
  right:8px;
  z-index:9999;
  color:red;
  font-size:18px;
  white-space:pre-wrap;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
th,td{
  border:1px solid rgba(255,255,255,0.25);
  text-align:center;
  color:#f0a100;
  font-weight:700;
}
th{
  background:linear-gradient(#7a4700,#120700);
  font-size:12px;
  height:24px;
}
td{
  font-size:16px;
  height:24px;
}
.cell{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.delay{background:red;color:#fff;animation:flash .8s infinite;}
.ontime{background:#00a83a;color:#fff;}
@keyframes flash{
  0%{opacity:1}
  50%{opacity:.3}
  100%{opacity:1}
}
</style>
</head>
<body>

<div id="error"></div>
<table>
  <thead><tr id="head"></tr></thead>
  <tbody id="body"></tbody>
</table>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i=0;i<text.length;i++){
    const ch = text[i];
    const next = text[i+1];

    if(ch === '"'){
      if(inQuotes && next === '"'){
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(ch === ',' && !inQuotes){
      row.push(cell);
      cell = "";
    } else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if(cell.length || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function clean(v){
  v = String(v || "").trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m) return `${m[3]}-${monthNames[+m[2]]}`;
  return v;
}

function status(v){
  const s = String(v || "").toUpperCase().replace(/[\s\-]/g,"");
  if(s.includes("DELAY")) return "delay";
  if(s.includes("ONTIME")) return "ontime";
  return "";
}

function makeCell(tag,val){
  const el = document.createElement(tag);
  const div = document.createElement("div");
  div.className = "cell";
  const txt = clean(val);
  const st = status(txt);
  if(st) div.classList.add(st);
  div.textContent = txt;
  el.appendChild(div);
  return el;
}

function render(rows){
  const err = document.getElementById("error");
  const head = document.getElementById("head");
  const body = document.getElementById("body");

  head.innerHTML = "";
  body.innerHTML = "";

  if(!rows || rows.length < 2){
    err.textContent = "NO DATA\n\nResponse preview:\n" + window.__lastText.slice(0,500);
    return;
  }

  err.textContent = "";

  const header = rows[0];
  header.slice(0,5).forEach(h => head.appendChild(makeCell("th", h)));

  rows.slice(1).forEach(r => {
    const tr = document.createElement("tr");
    for(let i=0;i<5;i++){
      tr.appendChild(makeCell("td", r[i] || ""));
    }
    body.appendChild(tr);
  });
}

async function load(){
  try{
    const res = await fetch(URL + "&t=" + Date.now(), {cache:"no-store"});
    const text = await res.text();
    window.__lastText = text;
    const rows = parseCSV(text);
    render(rows);
  } catch(e){
    document.getElementById("error").textContent = "LOAD ERROR\n\n" + e;
  }
}

load();
setInterval(load,8000);
</script>

</body>
</html>
