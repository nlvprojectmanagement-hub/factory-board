<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg:#000;
  --grid:rgba(255,255,255,0.18);
  --grid-strong:rgba(255,255,255,0.30);
  --header-text:#f0a100;
  --data-text:#fff;
  --muted:#bdbdbd;
  --header-grad:linear-gradient(180deg,#7a4700 0%,#2b1700 50%,#120700 100%);
  --panel-grad:linear-gradient(180deg,#080808 0%,#000 100%);
  --delay-bg:#ff0000;
  --delay-dim:#320000;
  --ontime-bg:#00a83a;
  --risk-bg:#ffbf00;
}

html, body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

#viewport {
  position:fixed;
  inset:0;
  background:#000;
  overflow:hidden;
}

#scaleWrapper {
  width:100vw;
  height:100vh;
  padding:6px;
}

.screen {
  width:100%;
  height:100%;
  display:grid;
  grid-template-rows:64px 1fr 92px;
  gap:6px;
}

/* TOP LOGO + BULLETIN */
.top-bar {
  display:grid;
  grid-template-columns:220px 1fr;
  gap:6px;
  min-height:0;
}

.logo-cell {
  background:var(--panel-grad);
  border:1px solid var(--grid);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:4px;
}

.logo-cell img {
  max-height:54px;
  max-width:100%;
  object-fit:contain;
}

.ticker-panel {
  background:var(--panel-grad);
  border:1px solid var(--grid);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.ticker-title {
  height:24px;
  background:var(--header-grad);
  color:var(--header-text);
  font-weight:700;
  font-size:14px;
  display:flex;
  align-items:center;
  padding-left:10px;
  border-bottom:1px solid var(--grid);
}

.ticker-window {
  position:relative;
  flex:1;
  overflow:hidden;
  display:flex;
  align-items:center;
  color:#fff;
  font-size:18px;
  font-weight:700;
  white-space:nowrap;
}

.ticker-text {
  position:absolute;
  white-space:nowrap;
  animation:moveLeftRight 26s linear infinite;
}

@keyframes moveLeftRight {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(100vw); }
}

/* MAIN TABLE AREA */
.main-area {
  display:grid;
  grid-template-columns:4fr 1.6fr 1.4fr;
  gap:6px;
  min-height:0;
}

.panel {
  min-height:0;
  background:var(--panel-grad);
  overflow:hidden;
}

table {
  width:100%;
  height:auto;
  border-collapse:collapse;
  table-layout:auto;
}

th, td {
  border:1px solid var(--grid);
  text-align:center;
  vertical-align:middle;
  font-weight:700;
}

th {
  height:26px;
  padding:2px 5px;
  font-size:clamp(11px,0.85vw,15px);
  background:var(--header-grad);
  border-color:var(--grid-strong);
  color:var(--header-text);
  white-space:nowrap;
  overflow:hidden;
}

td {
  height:24px;
  padding:0;
  font-size:clamp(11px,0.95vw,16px);
  background:rgba(0,0,0,0.90);
  color:var(--data-text);
}

.cell {
  width:100%;
  height:100%;
  min-height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2px 5px;
  white-space:nowrap;
  overflow:hidden;
  color:inherit;
}

.cell.left {
  justify-content:flex-start;
  padding-left:6px;
}

/* STATUS */
.delay-cell { background:#240000 !important; }

.delay-fill {
  width:calc(100% - 2px);
  height:calc(100% - 2px);
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--delay-bg);
  color:#fff;
  font-weight:900;
  animation:flashDelay .65s linear infinite;
}

@keyframes flashDelay {
  0% { background:var(--delay-bg); }
  50% { background:var(--delay-dim); }
  100% { background:var(--delay-bg); }
}

.ontime-cell {
  background:var(--ontime-bg) !important;
  color:#fff !important;
}

.risk-cell {
  background:var(--risk-bg) !important;
  color:#000 !important;
}

.muted { color:var(--muted) !important; }

/* NOTES */
.notes-panel {
  background:var(--panel-grad);
  border:1px solid var(--grid);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.notes-title {
  height:24px;
  background:var(--header-grad);
  color:var(--header-text);
  font-weight:700;
  font-size:14px;
  display:flex;
  align-items:center;
  padding-left:10px;
  border-bottom:1px solid var(--grid);
}

.notes-window {
  position:relative;
  flex:1;
  overflow:hidden;
  display:flex;
  align-items:center;
  color:#fff;
  font-size:18px;
  font-weight:700;
  white-space:nowrap;
}

.notes-text {
  position:absolute;
  white-space:nowrap;
  animation:moveLeftRight 30s linear infinite;
}

.error {
  color:red;
  font-size:18px;
  padding:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>
<div id="viewport">
  <div id="scaleWrapper">
    <div class="screen">

      <div class="top-bar">
        <div class="logo-cell">
          <img src="Picsart_24-07-23_20-35-10-625.png" alt="Company Logo">
        </div>

        <div class="ticker-panel">
          <div class="ticker-title" id="bulletinTitle">BULLETIN</div>
          <div class="ticker-window">
            <div class="ticker-text" id="bulletinText"></div>
          </div>
        </div>
      </div>

      <div class="main-area" id="mainArea"></div>

      <div class="notes-panel">
        <div class="notes-title" id="notesTitle">NOTES</div>
        <div class="notes-window">
          <div class="notes-text" id="notesText"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS = 8000;
const EXTRA_BLANK_ROWS = 1;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === "," && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
      if (ch === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function clean(value) {
  if (value == null) return "";
  const v = String(value).trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/);
  if (m) return `${m[3]}-${MONTHS[+m[2]]}`;
  return v;
}

function normalize(value) {
  return clean(value).toUpperCase().replace(/[\s\-]+/g, "");
}

function getStatus(value) {
  const s = normalize(value);
  if (s.includes("DELAY")) return "delay";
  if (s.includes("ONTIME")) return "ontime";
  if (s.includes("RISK")) return "risk";
  return "";
}

function isMuted(value) {
  const t = clean(value).toUpperCase();
  return t === "N/A" || t === "-";
}

function findRow(rows, keyword) {
  const k = keyword.toUpperCase();
  return rows.findIndex(r => r.some(c => clean(c).toUpperCase() === k));
}

function detectSections(headerRow) {
  const sections = [];
  let start = null;

  for (let i = 0; i <= headerRow.length; i++) {
    const value = i < headerRow.length ? clean(headerRow[i]) : "";
    const filled = value !== "";

    if (filled && start === null) start = i;

    if ((!filled || i === headerRow.length) && start !== null) {
      sections.push({ start, end:i - 1, title:clean(headerRow[start]) });
      start = null;
    }
  }

  return sections;
}

function makeCell(tag, value, leftAlign = false) {
  const raw = String(value || "").trim();
  const txt = clean(raw);
  const status = getStatus(raw);

  const el = document.createElement(tag);

  if (status === "delay") {
    el.classList.add("delay-cell");
    const fill = document.createElement("div");
    fill.className = "delay-fill";
    fill.textContent = txt;
    el.appendChild(fill);
    return el;
  }

  if (status === "ontime") el.classList.add("ontime-cell");
  if (status === "risk") el.classList.add("risk-cell");

  const d = document.createElement("div");
  d.className = "cell" + (leftAlign ? " left" : "");
  if (!status && isMuted(txt)) d.classList.add("muted");
  d.textContent = txt;
  el.appendChild(d);
  return el;
}

function rowHasData(row, section) {
  for (let c = section.start; c <= section.end; c++) {
    if (clean(row[c]) !== "") return true;
  }
  return false;
}

function renderTablePanel(section, headerRow, rows, leftAlign = false) {
  const panel = document.createElement("div");
  panel.className = "panel";

  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const tbody = document.createElement("tbody");
  const trHead = document.createElement("tr");

  for (let c = section.start; c <= section.end; c++) {
    trHead.appendChild(makeCell("th", headerRow[c], leftAlign));
  }

  thead.appendChild(trHead);
  table.appendChild(thead);

  const visibleRows = rows.filter(r => rowHasData(r, section));
  const rowCount = visibleRows.length + EXTRA_BLANK_ROWS;

  for (let r = 0; r < rowCount; r++) {
    const row = visibleRows[r] || [];
    const tr = document.createElement("tr");

    for (let c = section.start; c <= section.end; c++) {
      tr.appendChild(makeCell("td", row[c], leftAlign));
    }

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  panel.appendChild(table);
  return panel;
}

function collectTextFromRows(rows) {
  return rows
    .map(r => r.map(clean).filter(v => v !== "").join("   "))
    .filter(v => v !== "")
    .join("     •     ");
}

function render(data) {
  const bulletinText = document.getElementById("bulletinText");
  const notesText = document.getElementById("notesText");
  const mainArea = document.getElementById("mainArea");

  mainArea.innerHTML = "";
  bulletinText.textContent = "";
  notesText.textContent = "";

  if (!data || data.length < 2) {
    document.body.innerHTML = '<div class="error">NO DATA</div>';
    return;
  }

  const bulletinRowIndex = findRow(data, "BULLETIN");
  const salesHeaderIndex = findRow(data, "SALES ORDER");
  const notesRowIndex = findRow(data, "NOTES");

  if (bulletinRowIndex >= 0) {
    document.getElementById("bulletinTitle").textContent = "BULLETIN";
    const nextBreak = salesHeaderIndex > bulletinRowIndex ? salesHeaderIndex : data.length;
    const bulletinRows = data.slice(bulletinRowIndex + 1, nextBreak);
    bulletinText.textContent = collectTextFromRows(bulletinRows);
  }

  if (notesRowIndex >= 0) {
    document.getElementById("notesTitle").textContent = "NOTES";
    const notesRows = data.slice(notesRowIndex + 1);
    notesText.textContent = collectTextFromRows(notesRows);
  }

  if (salesHeaderIndex < 0) {
    mainArea.innerHTML = '<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header = data[salesHeaderIndex];
  const tableEnd = notesRowIndex > salesHeaderIndex ? notesRowIndex : data.length;
  const rows = data.slice(salesHeaderIndex + 1, tableEnd);
  const sections = detectSections(header);

  if (sections.length > 0) {
    mainArea.style.gridTemplateColumns = sections
      .map((s, i) => i === 0 ? "4fr" : "1.8fr")
      .join(" ");
  }

  sections.forEach((section, index) => {
    const leftAlign = index >= 2;
    mainArea.appendChild(renderTablePanel(section, header, rows, leftAlign));
  });
}

async function load() {
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now(), { cache:"no-store" });
    const text = await res.text();
    const data = parseCSV(text);
    render(data);
  } catch (e) {
    document.body.innerHTML = '<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
