<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #000;
  --grid: rgba(255,255,255,0.18);
  --grid-strong: rgba(255,255,255,0.30);
  --header-text: #f0a100;
  --data-text: #ffffff;
  --muted: #bdbdbd;
  --header-grad: linear-gradient(180deg, #7a4700 0%, #2b1700 50%, #120700 100%);
  --panel-grad: linear-gradient(180deg, #080808 0%, #000 100%);
  --delay-bg: #ff0000;
  --delay-dim: #320000;
  --ontime-bg: #00a83a;
  --risk-bg: #ffbf00;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
}

#viewport {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #000;
}

#scaleWrapper {
  width: 100vw;
  height: 100vh;
  padding: 6px;
}

.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 9% 91%;
  gap: 6px;
}

/* LOGO ROW */
.logo-row {
  display: grid;
  grid-template-columns: 4fr 1.8fr 1.6fr 1.8fr;
  gap: 6px;
  width: 100%;
  height: 100%;
}

.logo-box {
  grid-column: 1 / 2;
  background: var(--panel-grad);
  border: 1px solid var(--grid);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 12px;
  overflow: hidden;
}

.logo-box img {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
}

.logo-spacer {
  background: var(--panel-grad);
  border: 1px solid var(--grid);
}

.top {
  display: grid;
  grid-template-columns: 4fr 1.8fr 1.6fr 1.8fr;
  gap: 6px;
  width: 100%;
  height: 100%;
}

.panel {
  min-height: 0;
  background: var(--panel-grad);
  overflow: hidden;
}

table {
  width: 100%;
  height: auto;
  border-collapse: collapse;
  table-layout: auto;
}

th, td {
  border: 1px solid var(--grid);
  text-align: center;
  vertical-align: middle;
  font-weight: 700;
}

th {
  height: 26px;
  padding: 2px 5px;
  font-size: clamp(11px, 0.85vw, 15px);
  background: var(--header-grad);
  border-color: var(--grid-strong);
  color: var(--header-text);
  white-space: nowrap;
  overflow: hidden;
}

td {
  height: 24px;
  padding: 0;
  font-size: clamp(11px, 0.95vw, 16px);
  background: rgba(0,0,0,0.90);
  color: var(--data-text);
}

.cell {
  width: 100%;
  height: 100%;
  min-height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px 5px;
  white-space: nowrap;
  overflow: hidden;
  color: inherit;
}

.cell.left {
  justify-content: flex-start;
  padding-left: 6px;
}

.delay-cell { background: #240000 !important; }

.delay-fill {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--delay-bg);
  color: #fff;
  font-weight: 900;
  animation: flashDelay 0.65s linear infinite;
}

@keyframes flashDelay {
  0% { background: var(--delay-bg); }
  50% { background: var(--delay-dim); }
  100% { background: var(--delay-bg); }
}

.ontime-cell {
  background: var(--ontime-bg) !important;
  color: #fff !important;
}

.risk-cell {
  background: var(--risk-bg) !important;
  color: #000 !important;
}

.muted { color: var(--muted) !important; }

.bulletin-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.bulletin-header {
  height: 26px;
  padding: 2px 8px;
  display: flex;
  align-items: center;
  color: var(--header-text);
  font-size: clamp(11px, 0.85vw, 15px);
  font-weight: 700;
  background: var(--header-grad);
  border: 1px solid var(--grid-strong);
  border-bottom: none;
  white-space: nowrap;
  overflow: hidden;
}

.bulletin-box {
  flex: 1;
  min-height: 0;
  border: 1px solid var(--grid);
  background: rgba(0,0,0,0.90);
}

.bulletin-line {
  position: relative;
  display: flex;
  align-items: center;
  height: 24px;
  padding: 2px 8px;
  font-size: clamp(11px, 0.9vw, 15px);
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  border-top: 1px solid rgba(255,255,255,0.16);
}

.bulletin-line:first-child { border-top: none; }

.bulletin-scroll {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scrollBulletin 22s linear infinite;
}

.bulletin-line.short .bulletin-scroll {
  padding-left: 0;
  animation: none;
}

@keyframes scrollBulletin {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.error {
  color: red;
  font-size: 18px;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>
<div id="viewport">
  <div id="scaleWrapper">
    <div class="screen">

      <div class="logo-row">
        <div class="logo-box">
          <img src="Picsart_24-07-23_20-35-10-625.png" alt="Company Logo">
        </div>
        <div class="logo-spacer"></div>
        <div class="logo-spacer"></div>
        <div class="logo-spacer"></div>
      </div>

      <div class="top" id="topGrid"></div>

    </div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS = 8000;
const EXTRA_BLANK_ROWS = 1;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function clean(value) {
  if (value == null) return "";
  const v = String(value).trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/);
  if (m) return `${m[3]}-${MONTHS[+m[2]]}`;
  return v;
}
