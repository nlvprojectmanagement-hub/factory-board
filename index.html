<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(255,255,255,.24);
  --gridStrong:rgba(255,255,255,.42);
  --gold:#ffae00;
  --white:#f5f5f5;
  --header:linear-gradient(180deg,#6b3b00 0%,#1b0d00 70%,#050200 100%);
  --panelA:#101820;
  --panelB:#141414;
  --panelC:#1a1622;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:40px 1fr;
  gap:4px;
  padding:4px;
  background:#000;
}

/* TOP BAR */
.top{
  display:grid;
  grid-template-columns:150px 1fr 250px;
  gap:4px;
}

.logo,
.announcement,
.clock{
  border:1px solid var(--grid);
  background:#000;
  overflow:hidden;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
  max-width:100%;
  object-fit:contain;
}

.announcement{
  display:grid;
  grid-template-columns:145px 1fr;
}

.announcement-label{
  background:var(--header);
  color:var(--gold);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:90px;
  white-space:nowrap;
  color:#fff;
  font-weight:800;
  font-size:11px;
  animation:move 38s linear infinite;
}

@keyframes move{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.clock{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.clock-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold);
  font-weight:900;
  font-size:11px;
  border-left:1px solid var(--grid);
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 8fr
    11fr 10fr
    11fr 10fr
    11fr 10fr
    14fr 8fr 9fr;

  grid-template-rows:
    18px
    repeat(16, 18px)
    18px
    repeat(8, 16px);

  align-content:start;
  border:1px solid var(--grid);
  background:#000;
  overflow:hidden;
  min-height:0;
}

.cell{
  height:100%;
  min-height:0;
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:#000;
  color:var(--white);
  font-weight:800;
  font-size:10px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 3px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
  min-width:0;
}

.header{
  background:var(--header);
  color:var(--gold);
  font-weight:900;
  font-size:9.5px;
}

.group-start{
  border-left:1px solid rgba(255,174,0,.55);
}

.panel-a{
  background:var(--panelA);
}

.panel-b{
  background:var(--panelB);
}

.panel-c{
  background:var(--panelC);
}

.left{
  justify-content:flex-start;
  padding-left:5px;
}

.inner{
  white-space:nowrap;
}

.long .inner{
  position:absolute;
  animation:scrollCell 16s linear infinite;
}

@keyframes scrollCell{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

/* STATUS COLORS */
.delay,
.p1{
  color:#fff!important;
  animation:flashRed .65s steps(2,end) infinite!important;
}

@keyframes flashRed{
  0%{background:#ff0000;color:#fff}
  50%{background:#330000;color:#fff}
  100%{background:#ff0000;color:#fff}
}

.ontime,
.ready{
  background:#00a83a!important;
  color:#fff!important;
}

.p2{
  background:#ffae00!important;
  color:#000!important;
}

.pull{
  background:#ffff00!important;
  color:#000!important;
}

.pulling{
  background:#00b0f0!important;
  color:#000!important;
}

.waiting{
  color:#cfcfcf!important;
}

.error{
  color:red;
  font-size:22px;
  font-weight:900;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">
    <div class="logo">
      <img src="Picsart_24-07-23_20-35-10-625.png">
    </div>

    <div class="announcement">
      <div class="announcement-label" id="announceLabel">ANNOUNCEMENT</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="clock">
      <div class="clock-cell" id="dateBox"></div>
      <div class="clock-cell" id="timeBox"></div>
    </div>
  </div>

  <div class="board" id="board"></div>

</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=8000;
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows=[];
  let row=[],cell="",q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){
        cell+='"';
        i++;
      }else{
        q=!q;
      }
    }else if(ch===","&&!q){
      row.push(cell);
      cell="";
    }else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      row.push(cell);
      rows.push(row);
      row=[];
      cell="";
    }else{
      cell+=ch;
    }
  }

  if(cell.length||row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function clean(v){
  if(v==null)return "";
  const s=String(v).trim();
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m)return `${m[3]}-${MONTHS[+m[2]]}`;
  return s;
}

function norm(v){
  return clean(v).toUpperCase().replace(/[\s\-]+/g,"");
}

function findRow(data,terms){
  return data.findIndex(r=>r.some(c=>{
    const v=clean(c).toUpperCase();
    return terms.some(t=>v.includes(t));
  }));
}

function statusClass(text){
  const s=norm(text);

  if(s.includes("DELAY"))return"delay";
  if(s==="P1")return"p1";
  if(s==="P2")return"p2";
  if(s==="PULL")return"pull";
  if(s==="PULLING")return"pulling";
  if(s==="READY")return"ready";
  if(s.includes("ONTIME"))return"ontime";
  if(s==="WAITING")return"waiting";

  return"";
}

function updateClock(){
  const now=new Date();

  document.getElementById("dateBox").textContent =
    now.toLocaleDateString("en-US",{
      month:"short",
      day:"numeric",
      year:"numeric"
    });

  document.getElementById("timeBox").textContent =
    now.toLocaleTimeString("en-US",{
      hour:"numeric",
      minute:"2-digit",
      second:"2-digit"
    });
}

setInterval(updateClock,1000);
updateClock();

function setAnnouncement(label,text){
  document.getElementById("announceLabel").textContent=label || "ANNOUNCEMENT";

  const finalText=text && text.trim() ? text : " ";
  const spans=document.querySelectorAll("#announceTrack span");

  spans[0].textContent=finalText;
  spans[1].textContent=finalText;
}

function makeCell(text, options={}){
  const div=document.createElement("div");
  div.className="cell";

  if(options.header)div.classList.add("header");
  if(options.left)div.classList.add("left");
  if(options.groupStart)div.classList.add("group-start");
  if(options.extraClass)div.classList.add(options.extraClass);

  const cls=statusClass(text);
  if(cls)div.classList.add(cls);

  const inner=document.createElement("span");
  inner.className="inner";
  inner.textContent=clean(text);

  div.appendChild(inner);

  if(options.colStart) div.style.gridColumnStart=options.colStart;
  if(options.colEnd) div.style.gridColumnEnd=options.colEnd;
  if(options.rowStart) div.style.gridRowStart=options.rowStart;

  requestAnimationFrame(()=>{
    if(inner.scrollWidth > div.clientWidth){
      div.classList.add("long");
    }
  });

  return div;
}

function render(data){
  const board=document.getElementById("board");
  board.innerHTML="";

  const annRow=findRow(data,["ANNOUNCEMENT","ANOUNCEMENT"]);
  const headerRow=findRow(data,["SALES ORDER"]);
  const notesRow=findRow(data,["NOTES"]);

  if(annRow>=0){
    const label=clean(data[annRow][0]);
    const text=data[annRow].slice(1,11).map(clean).filter(Boolean).join("     •     ");
    setAnnouncement(label,text);
  }

  if(headerRow<0){
    board.innerHTML='<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header=data[headerRow];

  /* MAIN HEADER */
  board.appendChild(makeCell(header[0],{header:true,rowStart:1,colStart:1}));
  board.appendChild(makeCell(header[1],{header:true,rowStart:1,colStart:2}));
  board.appendChild(makeCell(header[2],{header:true,rowStart:1,colStart:3}));

  board.appendChild(makeCell(header[3],{header:true,rowStart:1,colStart:4,colEnd:6,groupStart:true}));
  board.appendChild(makeCell(header[5],{header:true,rowStart:1,colStart:6,colEnd:8,groupStart:true}));
  board.appendChild(makeCell(header[7],{header:true,rowStart:1,colStart:8,colEnd:10,groupStart:true,extraClass:"panel-a"}));

  board.appendChild(makeCell(header[9],{header:true,rowStart:1,colStart:10,groupStart:true,extraClass:"panel-a"}));
  board.appendChild(makeCell(header[10],{header:true,rowStart:1,colStart:11,extraClass:"panel-a"}));
  board.appendChild(makeCell(header[11],{header:true,rowStart:1,colStart:12,extraClass:"panel-a"}));

  /* MAIN ROWS */
  const tableEnd=notesRow>headerRow ? notesRow : data.length;
  const mainRows=data.slice(headerRow+1,tableEnd);

  for(let r=0;r<16;r++){
    const row=mainRows[r] || [];
    const gridRow=2+r;

    for(let c=0;c<12;c++){
      const opt={
        rowStart:gridRow,
        colStart:c+1,
        groupStart:[4,6,8,10].includes(c+1)
      };

      if(c+1>=8 && c+1<=12){
        opt.extraClass="panel-a";
      }

      board.appendChild(makeCell(row[c],opt));
    }
  }

  /* BOTTOM HEADER */
  const notesTitle = notesRow>=0 ? clean(data[notesRow][0]) : "NOTES / IMPORTANT REMARKS";

  board.appendChild(makeCell(notesTitle,{
    header:true,
    left:true,
    rowStart:18,
    colStart:1,
    colEnd:9,
    extraClass:"panel-b"
  }));

  board.appendChild(makeCell("INSPECTION",{
    header:true,
    rowStart:18,
    colStart:9,
    colEnd:11,
    groupStart:true,
    extraClass:"panel-c"
  }));

  board.appendChild(makeCell("REQ DATE",{
    header:true,
    rowStart:18,
    colStart:11,
    extraClass:"panel-c"
  }));

  board.appendChild(makeCell("STATUS",{
    header:true,
    rowStart:18,
    colStart:12,
    extraClass:"panel-c"
  }));

  /* BOTTOM ROWS */
  const bottomRows = notesRow>=0 ? data.slice(notesRow+1) : [];

  for(let r=0;r<8;r++){
    const row=bottomRows[r] || [];
    const gridRow=19+r;

    board.appendChild(makeCell(row[0],{
      left:true,
      rowStart:gridRow,
      colStart:1,
      colEnd:9,
      extraClass:"panel-b"
    }));

    board.appendChild(makeCell(row[8],{
      left:true,
      rowStart:gridRow,
      colStart:9,
      colEnd:11,
      groupStart:true,
      extraClass:"panel-c"
    }));

    board.appendChild(makeCell(row[10],{
      rowStart:gridRow,
      colStart:11,
      extraClass:"panel-c"
    }));

    board.appendChild(makeCell(row[11],{
      rowStart:gridRow,
      colStart:12,
      extraClass:"panel-c"
    }));
  }
}

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    const text=await res.text();
    render(parseCSV(text));
  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
