<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(180,205,230,.26);
  --gridStrong:rgba(255,122,0,.45);
  --orange:#ff7a00;
  --white:#f4f7fb;
  --mainBlock:#020202;
  --shipBlock:#07131b;
  --notesBlock:#050505;
  --inspectionBlock:#130f18;
  --salesBlock:#1e1e1e;
  --topHeight:26px;
  --mainRow:clamp(13px,1.5vh,18px);
  --noteRow:clamp(11px,1.2vh,14px);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:var(--topHeight) 1fr;
  gap:3px;
  padding:3px;
  background:#000;
}

/* TOP BAR */
.top{
  display:grid;
  grid-template-columns:150px minmax(0,1fr) 230px;
  gap:3px;
  min-width:0;
  overflow:hidden;
}

.logo,.announcement,.right-panel{
  border:1px solid var(--grid);
  background:#fff;
  overflow:hidden;
  min-width:0;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:26px;
  max-width:150px;
  object-fit:contain;
}

.announcement{
  display:grid;
  grid-template-columns:150px minmax(0,1fr);
  min-width:0;
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid rgba(0,0,0,.18);
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
  min-width:0;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#111;
  font-weight:900;
  font-size:11px;
  animation:move 70s linear infinite;
  will-change:transform;
}

@keyframes move{
  from{transform:translate3d(100%,0,0)}
  to{transform:translate3d(-100%,0,0)}
}

/* RIGHT PANEL */
.right-panel{
  display:flex;
  justify-content:flex-end;
  align-items:stretch;
  min-width:0;
}

.clock-box{
  width:80px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  line-height:1.1;
  border-left:1px solid rgba(0,0,0,.18);
}
#timeBox{
  font-size:16px;

  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

#dateBox{
  font-size:11px;

  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}
.weather-box{
  width:185px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding-left:6px;
  line-height:1.05;
  color:#000;
  font-weight:900;
  overflow:hidden;
}

.weather-top{
  font-size:9px;
  white-space:nowrap;
}

.weather-mid,
.weather-bottom{
  font-size:8px;
  white-space:nowrap;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 7fr 7fr
    10fr 9fr
    10fr 9fr
    9fr 9fr
    12fr 7fr 16fr;

  grid-template-rows:
    var(--mainRow)
    repeat(18,var(--mainRow))
    var(--mainRow)
    repeat(26,var(--noteRow));

  align-content:start;
  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
  background:#000;
  overflow:hidden;
  min-height:0;
}

.cell{
  height:100%;
  min-height:0;
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:var(--mainBlock);
  color:var(--white);
  font-weight:800;
  font-size:clamp(8px,.7vw,10px);
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
}

.header{
  background:#000!important;
  color:var(--orange);
  font-weight:900;
  font-size:clamp(8px,.65vw,9.5px);
  text-transform:uppercase;
}

.group-start{
  border-left:1px solid var(--gridStrong);
}

.ship-section{background:var(--shipBlock)}
.notes-section{background:var(--notesBlock)}
.inspect-section{background:var(--inspectionBlock)}

.sales-order{
  background:var(--salesBlock)!important;
  color:#e6e6e6!important;
}

.left{
  justify-content:flex-start;
  padding-left:6px;
}

.sales-entry{
  font-size:clamp(9px,.8vw,11.5px);
  font-weight:900;
}

.inner{white-space:nowrap}

.long .inner{
  position:absolute;
  animation:scrollCell 16s linear infinite;
}

@keyframes scrollCell{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

.struck{
  text-decoration:line-through;
  color:#777!important;
}

.delay,.p1{background:#ff0000!important;color:#fff!important}
.ontime,.ready{background:#00a83a!important;color:#fff!important}
.p2{background:#ff7a00!important;color:#000!important}
.pull{background:#ffff00!important;color:#000!important}
.pulling{background:#00b0f0!important;color:#000!important}
.waiting{color:#b8b8b8!important}
.released{color:#00ff88!important}
.partial{color:#ffff00!important}
.hold,.notreleased{color:#ff3333!important}
.review,.revision,.clarification{color:#00b0f0!important}

.error{
  color:red;
  font-size:22px;
  font-weight:900;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">
  <div class="top">
    <div class="logo">
      <img src="GITHUB LOGO 2.png">
    </div>

    <div class="announcement">
      <div class="announcement-label">ANNOUNCEMENTS</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="clock-box">
        <div id="dateBox"></div>
        <div id="timeBox"></div>
      </div>

      <div class="weather-box">
        <div class="weather-top" id="weatherTop">Weather loading</div>
        <div class="weather-mid" id="weatherMid"></div>
        <div class="weather-bottom" id="weatherBottom"></div>
      </div>
    </div>
  </div>

  <div class="board" id="board"></div>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=3000;

const LAT=29.6161;
const LON=-95.5577;

const MAIN_ROWS=18;
const BOTTOM_START_ROW=20;
const BOTTOM_ROWS=26;
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows=[];
  let row=[],cell="",q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){cell+='"';i++}
      else q=!q;
    }else if(ch===","&&!q){
      row.push(cell); cell="";
    }else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      row.push(cell); rows.push(row); row=[]; cell="";
    }else{
      cell+=ch;
    }
  }

  if(cell.length||row.length){row.push(cell); rows.push(row)}
  return rows;
}

function clean(v){
  if(v==null)return "";
  const s=String(v).trim();
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m)return `${m[3]}-${MONTHS[+m[2]]}`;
  return s;
}

function displayText(v){return clean(v).replace(/^\*\*/,"").trim()}
function isStruck(v){return clean(v).startsWith("**")}
function norm(v){return displayText(v).toUpperCase().replace(/[\s\-\/]+/g,"")}

function findRow(data,terms){
  return data.findIndex(r=>r.some(c=>{
    const v=norm(c);
    return terms.some(t=>v.includes(norm(t)));
  }));
}

function statusClass(text){
  if(isStruck(text))return"struck";
  const s=norm(text);

  if(s.includes("DELAY"))return"delay";
  if(s==="P1")return"p1";
  if(s==="P2")return"p2";
  if(s==="PULL")return"pull";
  if(s==="PULLING")return"pulling";
  if(s==="READY")return"ready";
  if(s.includes("ONTIME"))return"ontime";
  if(s==="WAITING")return"waiting";

  if(s==="RELEASED")return"released";
  if(s==="PARTIAL")return"partial";
  if(s==="HOLD")return"hold";
  if(s==="NOTRELEASED")return"notreleased";
  if(s==="INREVIEW")return"review";
  if(s==="REVISION")return"revision";
  if(s==="CLARIFICATION")return"clarification";

  return"";
}

function updateClock(){
  const now=new Date();
  dateBox.textContent=now.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  timeBox.textContent = now.toLocaleTimeString("en-US",{
  hour:"numeric",
  minute:"2-digit",
  second:"2-digit"
});
}
setInterval(updateClock,1000);
updateClock();

function weatherIcon(code){
  if(code===0)return"☀️";
  if(code<=2)return"🌤️";
  if(code===3)return"☁️";
  if(code<=67)return"🌧️";
  if(code<=82)return"🌦️";
  if(code<=99)return"⛈️";
  return"🌫️";
}

function nextRainText(hourly){
  if(!hourly || !hourly.time)return "Next rain unavailable";

  const now=Date.now();

  for(let i=0;i<hourly.time.length;i++){
    const t=new Date(hourly.time[i]).getTime();
    const precip=Number(hourly.precipitation_probability?.[i] || 0);
    const rain=Number(hourly.precipitation?.[i] || 0);

    if(t>now && (precip>=35 || rain>0)){
      const dt=new Date(hourly.time[i]);
      const day=dt.toLocaleDateString("en-US",{weekday:"short"});
      const time=dt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
      return `Next rain ${day} ${time}`;
    }
  }

  return "Next rain none 7d";
}

async function loadWeather(){
  try{
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`+
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`+
      `&hourly=precipitation_probability,precipitation`+
      `&forecast_days=7&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`;

    const res=await fetch(url,{cache:"no-store"});
    const data=await res.json();
    const c=data.current;

    weatherTop.textContent =
      `${weatherIcon(c.weather_code)} Stafford ${Math.round(c.temperature_2m)}°F`;

    weatherMid.textContent =
      `Humidity ${c.relative_humidity_2m}% Wind ${Math.round(c.wind_speed_10m)}mph`;

    weatherBottom.textContent = nextRainText(data.hourly);
  }catch(e){
    weatherTop.textContent="Weather unavailable";
    weatherMid.textContent="";
    weatherBottom.textContent="";
  }
}
loadWeather();
setInterval(loadWeather,600000);

function setAnnouncement(text){
  const finalText=displayText(text)&&displayText(text).trim()?displayText(text):" ";
  const spans=document.querySelectorAll("#announceTrack span");
  spans[0].textContent=finalText;
  spans[1].textContent=finalText;
}

function makeCell(text,options={}){
  const div=document.createElement("div");
  div.className="cell";

  if(options.header)div.classList.add("header");
  if(options.left)div.classList.add("left");
  if(options.groupStart)div.classList.add("group-start");
  if(options.extraClass)div.classList.add(options.extraClass);
  if(options.salesEntry)div.classList.add("sales-entry");

  const cls=statusClass(text);
  if(cls)div.classList.add(cls);

  const inner=document.createElement("span");
  inner.className="inner";
  inner.textContent=displayText(text);
  div.appendChild(inner);

  if(options.colStart)div.style.gridColumnStart=options.colStart;
  if(options.colEnd)div.style.gridColumnEnd=options.colEnd;
  if(options.rowStart)div.style.gridRowStart=options.rowStart;

  requestAnimationFrame(()=>{
    if(inner.scrollWidth>div.clientWidth){
      div.classList.add("long");
    }
  });

  return div;
}

function render(data){
  const board=document.getElementById("board");
  board.innerHTML="";

  const annRow=findRow(data,["ANNOUNCEMENT","ANNOUNCEMENTS","ANNOUNCMENTS"]);
  const headerRow=findRow(data,["SALES ORDER"]);
  const notesRow=findRow(data,["NOTES"]);

  if(annRow>=0)setAnnouncement(data[annRow][1]);

  if(headerRow<0){
    board.innerHTML='<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header=data[headerRow];

  board.appendChild(makeCell(header[0],{header:true,rowStart:1,colStart:1,extraClass:"sales-order"}));
  board.appendChild(makeCell(header[1],{header:true,rowStart:1,colStart:2}));
  board.appendChild(makeCell(header[2],{header:true,rowStart:1,colStart:3}));
  board.appendChild(makeCell(header[3],{header:true,rowStart:1,colStart:4}));

  board.appendChild(makeCell(header[4],{header:true,rowStart:1,colStart:5,colEnd:7,groupStart:true}));
  board.appendChild(makeCell(header[6],{header:true,rowStart:1,colStart:7,colEnd:9,groupStart:true}));
  board.appendChild(makeCell(header[8],{header:true,rowStart:1,colStart:9,colEnd:11,groupStart:true}));

  board.appendChild(makeCell(header[10],{header:true,rowStart:1,colStart:11,groupStart:true,extraClass:"ship-section"}));
  board.appendChild(makeCell(header[11],{header:true,rowStart:1,colStart:12,extraClass:"ship-section"}));
  board.appendChild(makeCell(header[12],{header:true,rowStart:1,colStart:13,extraClass:"ship-section"}));

  const tableEnd=notesRow>headerRow?notesRow:data.length;
  const mainRows=data.slice(headerRow+1,tableEnd);

  for(let r=0;r<MAIN_ROWS;r++){
    const row=mainRows[r]||[];
    const gridRow=2+r;

    for(let c=0;c<13;c++){
      const opt={
        rowStart:gridRow,
        colStart:c+1,
        groupStart:[5,7,9,11].includes(c+1),
        salesEntry:c+1===1
      };

      if(c+1===1)opt.extraClass="sales-order";
      if(c+1>=11&&c+1<=13)opt.extraClass="ship-section";

      board.appendChild(makeCell(row[c],opt));
    }
  }

  const notesTitle=notesRow>=0?clean(data[notesRow][0]):"NOTES / IMPORTANT REMARKS";

  board.appendChild(makeCell(notesTitle,{
    header:true,left:true,rowStart:BOTTOM_START_ROW,colStart:1,colEnd:10,extraClass:"notes-section"
  }));

  board.appendChild(makeCell("INSPECTION",{
    header:true,rowStart:BOTTOM_START_ROW,colStart:10,colEnd:12,groupStart:true,extraClass:"inspect-section"
  }));

  board.appendChild(makeCell("REQ DATE",{
    header:true,rowStart:BOTTOM_START_ROW,colStart:12,extraClass:"inspect-section"
  }));

  board.appendChild(makeCell("STATUS",{
    header:true,rowStart:BOTTOM_START_ROW,colStart:13,extraClass:"inspect-section"
  }));

  const bottomRows=notesRow>=0?data.slice(notesRow+1):[];

  for(let r=0;r<BOTTOM_ROWS;r++){
    const row=bottomRows[r]||[];
    const gridRow=BOTTOM_START_ROW+1+r;

    board.appendChild(makeCell(row[0],{
      left:true,rowStart:gridRow,colStart:1,colEnd:10,extraClass:"notes-section"
    }));

    board.appendChild(makeCell(row[9],{
      left:true,rowStart:gridRow,colStart:10,colEnd:12,groupStart:true,extraClass:"inspect-section"
    }));

    board.appendChild(makeCell(row[11],{
      rowStart:gridRow,colStart:12,extraClass:"inspect-section"
    }));

    board.appendChild(makeCell(row[12],{
      rowStart:gridRow,colStart:13,extraClass:"inspect-section"
    }));
  }
}

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now()+"&rand="+Math.random(),{cache:"no-store"});
    const text=await res.text();
    render(parseCSV(text));
  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR: '+e.message+'</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
