<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(180,205,230,.26);
  --gridStrong:rgba(255,122,0,.45);
  --orange:#ff7a00;
  --white:#f4f7fb;
  --mainBlock:#020202;
  --shipBlock:#07131b;
  --notesBlock:#050505;
  --inspectionBlock:#130f18;
  --salesBlock:#1e1e1e;
  --topHeight:42px;
  --mainRow:clamp(13px,1.5vh,18px);
  --noteRow:clamp(11px,1.2vh,14px);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:var(--topHeight) 1fr;
  gap:3px;
  padding:3px;
  background:#000;
}

.top{
  display:grid;
  grid-template-columns:180px minmax(0,1fr) 300px;
  gap:3px;
  min-width:0;
  overflow:hidden;
}

.logo,.announcement,.right-panel{
  border:1px solid var(--grid);
  background:#fff;
  overflow:hidden;
  min-width:0;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:36px;
  max-width:170px;
  object-fit:contain;
}

.announcement{
  display:grid;
  grid-template-columns:155px minmax(0,1fr);
  min-width:0;
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid rgba(0,0,0,.18);
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
  min-width:0;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#111;
  font-weight:900;
  font-size:12px;
  animation:move 70s linear infinite;
  will-change:transform;
}

@keyframes move{
  from{transform:translate3d(100%,0,0)}
  to{transform:translate3d(-100%,0,0)}
}

.right-panel{
  display:grid;
  grid-template-columns:95px 205px;
  min-width:0;
}

.clock-box,.weather-box{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#000;
  font-weight:900;
  border-left:1px solid rgba(0,0,0,.18);
  overflow:hidden;
  min-width:0;
}

.clock-box{
  flex-direction:column;
  color:var(--orange);
  font-size:10px;
  line-height:1.15;
}

.weather-box{
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  padding-left:6px;
  line-height:1.08;
}

.weather-top{
  font-size:10px;
  font-weight:900;
  color:#000;
  white-space:nowrap;
}

.weather-mid,
.weather-bottom{
  font-size:8.5px;
  font-weight:800;
  color:#000;
  white-space:nowrap;
}

.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 7fr 7fr
    10fr 9fr
    10fr 9fr
    9fr 9fr
    12fr 7fr 16fr;

  grid-template-rows:
    var(--mainRow)
    repeat(18,var(--mainRow))
    var(--mainRow)
    repeat(26,var(--noteRow));

  align-content:start;
  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
  background:#000;
  overflow:hidden;
  min-height:0;
}

.cell{
  height:100%;
  min-height:0;
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:var(--mainBlock);
  color:var(--white);
  font-weight:800;
  font-size:clamp(8px,.7vw,10px);
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
}

.header{
  background:#000!important;
  color:var(--orange);
  font-weight:900;
  font-size:clamp(8px,.65vw,9.5px);
  text-transform:uppercase;
}

.group-start{
  border-left:1px solid var(--gridStrong);
}

.ship-section{background:var(--shipBlock)}
.notes-section{background:var(--notesBlock)}
.inspect-section{background:var(--inspectionBlock)}

.sales-order{
  background:var(--salesBlock)!important;
  color:#e6e6e6!important;
}

.left{
  justify-content:flex-start;
  padding-left:6px;
}

.sales-entry{
  font-size:clamp(9px,.8vw,11.5px);
  font-weight:900;
}

.inner{white-space:nowrap}

.long .inner{
  position:absolute;
  animation:scrollCell 16s linear infinite;
}

@keyframes scrollCell{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

.struck{
  text-decoration:line-through;
  color:#777!important;
}

.delay,.p1{background:#ff0000!important;color:#fff!important}
.ontime,.ready{background:#00a83a!important;color:#fff!important}
.p2{background:#ff7a00!important;color:#000!important}
.pull{background:#ffff00!important;color:#000!important}
.pulling{background:#00b0f0!important;color:#000!important}
.waiting{color:#b8b8b8!important}
.released{color:#00ff88!important}
.partial{color:#ffff00!important}
.hold,.notreleased{color:#ff3333!important}
.review,.revision,.clarification{color:#00b0f0!important}

.error{
  color:red;
  font-size:22px;
  font-weight:900;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">
  <div class="top">
    <div class="logo">
      <img src="GITHUB LOGO.png">
    </div>

    <div class="announcement">
      <div class="announcement-label">ANNOUNCEMENTS</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="clock-box">
        <div id="dateBox"></div>
        <div id="timeBox"></div>
      </div>

      <div class="weather-box">
        <div class="weather-top" id="weatherTop">Weather loading</div>
        <div class="weather-mid" id="weatherMid"></div>
        <div class="weather-bottom" id="weatherBottom"></div>
      </div>
    </div>
  </div>

  <div class="board" id="board"></div>
</div>
