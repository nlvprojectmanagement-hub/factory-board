<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#000;
  --grid:rgba(255,255,255,.26);
  --gridStrong:rgba(255,255,255,.45);
  --orange:#ffae00;
  --white:#f7f7f7;
  --muted:#bdbdbd;
  --header:linear-gradient(180deg,#7a4700 0%,#2a1600 58%,#090400 100%);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:48px 1fr 132px;
  gap:5px;
  padding:5px;
  background:#000;
}

/* TOP */
.top-row{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:5px;
}

.logo-box{
  border:1px solid var(--grid);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo-box img{
  max-height:40px;
  max-width:100%;
  object-fit:contain;
}

.announcement{
  border:1px solid var(--grid);
  background:#000;
  display:grid;
  grid-template-columns:155px 1fr;
  overflow:hidden;
}

.announcement-label{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:80px;
  white-space:nowrap;
  color:#fff;
  font-size:14px;
  font-weight:800;
  animation:marqueeMove 36s linear infinite;
}

@keyframes marqueeMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* MAIN: 4 SEPARATE PANELS */
.main-area{
  display:grid;
  grid-template-columns:58fr 16fr 8fr 18fr;
  gap:7px;
  min-height:0;
  overflow:hidden;
}

.panel{
  border:1px solid var(--grid);
  background:#000;
  overflow:hidden;
  min-width:0;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid var(--grid);
  text-align:center;
  vertical-align:middle;
  font-weight:800;
}

th{
  height:22px;
  background:var(--header);
  color:var(--orange);
  border-color:var(--gridStrong);
  font-size:11px;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
}

td{
  height:21px;
  background:#000;
  color:var(--white);
  font-size:12px;
  padding:0;
}

.cell{
  width:100%;
  height:100%;
  min-height:21px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
  color:inherit;
  position:relative;
}

.cell.left{
  justify-content:flex-start;
  padding-left:6px;
  font-size:11px;
}

.cell-inner{
  white-space:nowrap;
}

.cell.long .cell-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

@keyframes cellScroll{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

/* STATUS */
.delay{
  background:#ff0000!important;
  color:#fff!important;
  animation:flashDelay .65s linear infinite;
}

@keyframes flashDelay{
  0%{background:#ff0000}
  50%{background:#320000}
  100%{background:#ff0000}
}

.ontime{
  background:#00a83a!important;
  color:#fff!important;
}

.risk{
  background:#ffbf00!important;
  color:#000!important;
}

.muted{
  color:var(--muted)!important;
}

/* NOTES */
.notes{
  border:1px solid var(--grid);
  display:grid;
  grid-template-rows:24px 1fr;
  background:#000;
  overflow:hidden;
}

.notes-title{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  padding-left:10px;
  border-bottom:1px solid var(--gridStrong);
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:1fr;
  height:100%;
}

.note-cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  color:#fff;
  background:#000;
  font-size:12px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:1px 6px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
}

.note-cell:nth-child(2n){
  border-right:none;
}

.note-inner{
  white-space:nowrap;
}

.note-cell.long .note-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

.error{
  color:red;
  font-size:22px;
  font-weight:900;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top-row">
    <div class="logo-box">
      <img src="Picsart_24-07-23_20-35-10-625.png">
    </div>

    <div class="announcement">
      <div class="announcement-label" id="announcementLabel">ANNOUNCEMENT</div>
      <div class="marquee">
        <div class="marquee-track" id="announcementTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div id="mainPanel"></div>
    <div id="incomingPanel"></div>
    <div id="datePanel"></div>
    <div id="inspectionPanel"></div>
  </div>

  <div class="notes">
    <div class="notes-title">NOTES</div>
    <div class="notes-grid" id="notesGrid"></div>
  </div>

</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=8000;
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  const rows=[];
  let row=[],cell="",q=false;

  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];

    if(ch==='"'){
      if(q&&nx==='"'){cell+='"';i++}
      else q=!q;
    }else if(ch===","&&!q){
      row.push(cell);
      cell="";
    }else if((ch==="\n"||ch==="\r")&&!q){
      if(ch==="\r"&&nx==="\n")i++;
      row.push(cell);
      rows.push(row);
      row=[];
      cell="";
    }else{
      cell+=ch;
    }
  }

  if(cell.length||row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function clean(v){
  if(v==null)return "";
  const s=String(v).trim();
  const m=s.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m)return `${m[3]}-${MONTHS[+m[2]]}`;
  return s;
}

function findRow(rows,words){
  return rows.findIndex(r=>r.some(c=>{
    const v=clean(c).toUpperCase();
    return words.some(w=>v===w || v.includes(w));
  }));
}

function statusClass(v){
  const s=clean(v).toUpperCase().replace(/[\s\-]+/g,"");
  if(s.includes("DELAY"))return"delay";
  if(s.includes("ONTIME"))return"ontime";
  if(s.includes("RISK"))return"risk";
  return"";
}

function setAnnouncement(label,text){
  document.getElementById("announcementLabel").textContent=label || "ANNOUNCEMENT";
  const finalText=text && text.trim() ? text : " ";
  const spans=document.querySelectorAll("#announcementTrack span");
  spans[0].textContent=finalText;
  spans[1].textContent=finalText;
}

function makeCell(tag,text,left=false){
  const el=document.createElement(tag);
  const value=clean(text);
  const st=statusClass(value);

  if(st)el.classList.add(st);
  if(value.toUpperCase()==="N/A" || value==="-")el.classList.add("muted");

  const div=document.createElement("div");
  div.className="cell"+(left?" left":"");

  const inner=document.createElement("span");
  inner.className="cell-inner";
  inner.textContent=value;

  div.appendChild(inner);
  el.appendChild(div);

  requestAnimationFrame(()=>{
    if(inner.scrollWidth > div.clientWidth){
      div.classList.add("long");
    }
  });

  return el;
}

function renderTable(containerId,header,rows,cols,left=false){
  const container=document.getElementById(containerId);
  container.innerHTML="";

  const panel=document.createElement("div");
  panel.className="panel";

  const table=document.createElement("table");
  const thead=document.createElement("thead");
  const tbody=document.createElement("tbody");

  const htr=document.createElement("tr");
  cols.forEach(c=>htr.appendChild(makeCell("th",header[c],left)));
  thead.appendChild(htr);
  table.appendChild(thead);

  const visible=rows.filter(r=>cols.some(c=>clean(r[c])!==""));
  const totalRows=Math.max(visible.length+2,14);

  for(let i=0;i<totalRows;i++){
    const row=visible[i] || [];
    const tr=document.createElement("tr");
    cols.forEach(c=>tr.appendChild(makeCell("td",row[c],left)));
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  panel.appendChild(table);
  container.appendChild(panel);
}

function makeNoteCell(text){
  const cell=document.createElement("div");
  cell.className="note-cell";

  const inner=document.createElement("div");
  inner.className="note-inner";
  inner.textContent=clean(text);

  cell.appendChild(inner);

  requestAnimationFrame(()=>{
    if(inner.scrollWidth > cell.clientWidth){
      cell.classList.add("long");
    }
  });

  return cell;
}

function renderNotes(rows){
  const grid=document.getElementById("notesGrid");
  grid.innerHTML="";

  const visible=rows.filter(r=>clean(r[0])!=="" || clean(r[6])!=="");
  const total=Math.max(visible.length,6);

  for(let i=0;i<total;i++){
    const row=visible[i] || [];
    grid.appendChild(makeNoteCell(row[0]));
    grid.appendChild(makeNoteCell(row[6]));
  }
}

function render(data){
  const announcementRow=findRow(data,["ANNOUNCEMENT","ANOUNCEMENT","BULLETIN"]);
  const salesRow=findRow(data,["SALES ORDER"]);
  const notesRow=findRow(data,["NOTES"]);

  if(announcementRow>=0){
    const label=clean(data[announcementRow][0]);
    const text=data[announcementRow].slice(1,12).map(clean).filter(Boolean).join("     •     ");
    setAnnouncement(label,text);
  }else{
    setAnnouncement("ANNOUNCEMENT","");
  }

  if(notesRow>=0){
    renderNotes(data.slice(notesRow+1));
  }else{
    renderNotes([]);
  }

  if(salesRow<0){
    document.getElementById("mainPanel").innerHTML='<div class="error">SALES ORDER HEADER NOT FOUND</div>';
    return;
  }

  const header=data[salesRow];
  const tableEnd=notesRow>salesRow ? notesRow : data.length;
  const rows=data.slice(salesRow+1,tableEnd);

  renderTable("mainPanel",header,rows,[0,1,2,3,4,5],false);
  renderTable("incomingPanel",header,rows,[7],false);
  renderTable("datePanel",header,rows,[8],false);
  renderTable("inspectionPanel",header,rows,[10],true);
}

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    const text=await res.text();
    render(parseCSV(text));
  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
