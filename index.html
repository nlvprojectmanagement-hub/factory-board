<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

:root{
  --grid:rgba(255,255,255,.18);
  --orange:#f0a100;
  --header:linear-gradient(180deg,#7a4700,#1a0b00);
}

/* LAYOUT */
.screen{
  display:grid;
  grid-template-rows:70px 1fr 90px;
  height:100vh;
  gap:6px;
  padding:6px;
}

/* TOP BAR */
.top{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:6px;
}

.logo{
  border:1px solid var(--grid);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:60px;
  max-width:100%;
}

/* BULLETIN */
.bulletin{
  border:1px solid var(--grid);
  display:flex;
  flex-direction:column;
}

.title{
  background:var(--header);
  color:var(--orange);
  font-weight:bold;
  padding-left:10px;
  height:24px;
  display:flex;
  align-items:center;
}

.scroll{
  flex:1;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.scroll-text{
  position:absolute;
  white-space:nowrap;
  color:#fff;
  font-size:20px;
  font-weight:bold;
  animation:scroll 25s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100vw)}
}

/* MAIN TABLE AREA */
.main{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:1fr;
  gap:6px;
  overflow:hidden;
}

.panel{
  border:1px solid var(--grid);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid var(--grid);
  text-align:center;
}

th{
  background:var(--header);
  color:var(--orange);
  font-size:14px;
  padding:4px;
}

td{
  height:26px;
  font-size:14px;
}

/* FULL TEXT (NO CUT) */
.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  white-space:nowrap;
  overflow:hidden;
}

/* STATUS */
.delay{
  background:red;
  color:#fff;
  font-weight:bold;
  animation:flash .6s infinite;
}

@keyframes flash{
  50%{background:#300}
}

.ontime{
  background:#00a83a;
  color:#fff;
}

/* NOTES */
.notes{
  border:1px solid var(--grid);
  display:flex;
  flex-direction:column;
}

.notes .scroll-text{
  animation-duration:35s;
}

</style>
</head>

<body>

<div class="screen">

  <!-- TOP -->
  <div class="top">
    <div class="logo">
      <img src="Picsart_24-07-23_20-35-10-625.png">
    </div>

    <div class="bulletin">
      <div class="title">BULLETIN</div>
      <div class="scroll">
        <div class="scroll-text" id="bulletin"></div>
      </div>
    </div>
  </div>

  <!-- TABLES -->
  <div class="main" id="main"></div>

  <!-- NOTES -->
  <div class="notes">
    <div class="title">NOTES</div>
    <div class="scroll">
      <div class="scroll-text" id="notes"></div>
    </div>
  </div>

</div>

<script>
const CSV="PASTE YOUR CSV LINK HERE";

/* PARSE */
function parse(text){
  return text.split("\n").map(r=>r.split(","));
}

/* CLEAN */
function clean(v){
  return (v||"").trim();
}

/* FIND ROW */
function findRow(data,name){
  return data.findIndex(r=>r.includes(name));
}

/* STATUS */
function status(v){
  v=v.toUpperCase();
  if(v.includes("DELAY"))return"delay";
  if(v.includes("ON TIME"))return"ontime";
  return"";
}

/* RENDER CELL */
function td(v){
  const el=document.createElement("td");
  const d=document.createElement("div");
  d.className="cell";

  const s=status(v);
  if(s)el.classList.add(s);

  d.textContent=v;
  el.appendChild(d);
  return el;
}

/* DETECT SECTIONS */
function sections(header){
  let sec=[],start=null;

  header.forEach((v,i)=>{
    if(v && start===null)start=i;
    if(!v && start!==null){
      sec.push([start,i-1]);
      start=null;
    }
  });

  if(start!==null)sec.push([start,header.length-1]);
  return sec;
}

/* COLLECT TEXT A:L */
function collect(row){
  return row.slice(0,12).filter(x=>x).join("   •   ");
}

async function load(){
  const res=await fetch(CSV+"&t="+Date.now());
  const text=await res.text();
  const data=parse(text);

  const sales=findRow(data,"SALES ORDER");
  const notesRow=findRow(data,"NOTES");
  const bulletinRow=findRow(data,"BULLETIN");

  /* BULLETIN (ROW 1) */
  document.getElementById("bulletin").textContent =
    collect(data[bulletinRow]);

  /* NOTES (ALL BELOW NOTES ROW) */
  document.getElementById("notes").textContent =
    data.slice(notesRow+1).map(collect).join("     ");

  const header=data[sales];
  const rows=data.slice(sales+1,notesRow);

  const main=document.getElementById("main");
  main.innerHTML="";

  sections(header).forEach(([s,e])=>{
    const panel=document.createElement("div");
    panel.className="panel";

    const table=document.createElement("table");

    const trh=document.createElement("tr");
    for(let i=s;i<=e;i++){
      const th=document.createElement("th");
      th.textContent=header[i];
      trh.appendChild(th);
    }
    table.appendChild(trh);

    rows.forEach(r=>{
      const tr=document.createElement("tr");
      for(let i=s;i<=e;i++){
        tr.appendChild(td(clean(r[i])));
      }
      table.appendChild(tr);
    });

    panel.appendChild(table);
    main.appendChild(panel);
  });
}

load();
setInterval(load,8000);
</script>

</body>
</html>
