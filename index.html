<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>

<style>
*{box-sizing:border-box;}

:root{
  --bg:#000;
  --grid:rgba(255,255,255,0.25);
  --text:#ff9d00;
  --muted:#cfcfcf;

  /* stronger gradients */
  --header-grad:linear-gradient(180deg,#6b3e00 0%,#120700 100%);
  --panel-grad:linear-gradient(180deg,#151515 0%,#000 100%);
  --bullet-grad:linear-gradient(180deg,#5a3200 0%,#0a0300 100%);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

body{
  padding:8px;
  background:
    radial-gradient(circle at top left, rgba(255,166,0,0.1), transparent 30%),
    radial-gradient(circle at top right, rgba(255,166,0,0.06), transparent 25%),
    #000;
}

.screen{
  width:100%;
  height:100%;
  display:grid;
  grid-template-rows:86% 14%;
  gap:12px;
}

.top{
  display:grid;
  grid-template-columns:71% 21.5% 7.5%;
  gap:16px;
}

.panel{
  background:var(--panel-grad);
}

table{
  width:100%;
  height:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid var(--grid);
  text-align:center;
  padding:6px;
  color:var(--text);
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

th{
  font-size:18px;
  background:var(--header-grad);
}

td{
  font-size:18px;
  background:rgba(0,0,0,0.75);
}

/* DELAY flashing */
.delay{
  color:#fff !important;
  background:#ff0000 !important;
  animation:blink 0.7s infinite;
  text-shadow:0 0 12px #fff;
}

@keyframes blink{
  0%{background:#ff0000;color:#fff;}
  50%{background:#000;color:#ff0000;}
  100%{background:#ff0000;color:#fff;}
}

.muted{color:var(--muted)!important;}

.bulletin-wrap{
  display:flex;
  flex-direction:column;
}

.bulletin-title{
  border:1px solid var(--grid);
  border-bottom:none;
  background:var(--bullet-grad);
  color:var(--text);
  font-size:22px;
  padding:6px 12px;
}

.bulletin-box{
  border:1px solid var(--grid);
  display:grid;
  grid-template-rows:repeat(3,1fr);
}

.bulletin-line{
  border-top:1px solid var(--grid);
  padding:6px 12px;
  font-size:20px;
}

.error{
  color:red;
  font-size:24px;
  padding:20px;
}
</style>
</head>

<body>
<div class="screen">

<div class="top">

<div class="panel">
<table>
<thead><tr id="mainHead"></tr></thead>
<tbody id="mainBody"></tbody>
</table>
</div>

<div class="panel">
<table>
<thead><tr id="shipHead"></tr></thead>
<tbody id="shipBody"></tbody>
</table>
</div>

<div class="panel">
<table>
<thead><tr id="inspectHead"></tr></thead>
<tbody id="inspectBody"></tbody>
</table>
</div>

</div>

<div class="bulletin-wrap">
<div class="bulletin-title">BULLETIN</div>
<div class="bulletin-box" id="bulletinBox"></div>
</div>

</div>

<script>
const sheetId="1ML2ozfDmFhVqVetf0zNlrJRfnvfQZ_xrUP-gLN80XQ8";
const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function format(cell){
  if(!cell||cell.v==null)return "";

  if(typeof cell.v==="string") return cell.v.trim();

  if(cell.v instanceof Date){
    return cell.v.getDate()+"-"+monthNames[cell.v.getMonth()];
  }

  const raw=String(cell.v);
  const m=raw.match(/^Date\((\d+),(\d+),(\d+)/);
  if(m){
    return m[3]+"-"+monthNames[+m[2]];
  }

  return raw;
}

function isDelay(cell,val){
  const raw=cell&&cell.v?String(cell.v).toUpperCase():"";
  const shown=String(val).toUpperCase();
  return raw.includes("DELAY")||shown.includes("DELAY");
}

function build(td,cell){
  const val=format(cell);
  const el=document.createElement(td);
  el.textContent=val;

  if(isDelay(cell,val)) el.classList.add("delay");
  if(val==="N/A"||val==="-") el.classList.add("muted");

  return el;
}

function render(t){
  const rows=t.rows||[];
  if(!rows.length)return;

  const head=rows[0].c||[];
  const data=rows.slice(1);

  const mainHead=document.getElementById("mainHead");
  const shipHead=document.getElementById("shipHead");
  const inspectHead=document.getElementById("inspectHead");

  mainHead.innerHTML="";
  shipHead.innerHTML="";
  inspectHead.innerHTML="";

  [0,1,2,3,4].forEach(i=>mainHead.appendChild(build("th",head[i])));
  [6,7].forEach(i=>shipHead.appendChild(build("th",head[i])));
  inspectHead.appendChild(build("th",head[9]));

  const mainBody=document.getElementById("mainBody");
  const shipBody=document.getElementById("shipBody");
  const inspectBody=document.getElementById("inspectBody");

  mainBody.innerHTML="";
  shipBody.innerHTML="";
  inspectBody.innerHTML="";

  const count=Math.max(data.length,10);

  for(let i=0;i<count;i++){
    const r=data[i]?data[i].c||[]:[];

    const tr1=document.createElement("tr");
    [0,1,2,3,4].forEach(j=>tr1.appendChild(build("td",r[j])));
    mainBody.appendChild(tr1);

    const tr2=document.createElement("tr");
    [6,7].forEach(j=>tr2.appendChild(build("td",r[j])));
    shipBody.appendChild(tr2);

    const tr3=document.createElement("tr");
    tr3.appendChild(build("td",r[9]));
    inspectBody.appendChild(tr3);
  }
}

window.handleSheetResponse=function(res){
  if(res&&res.status==="ok") render(res.table);
  else document.body.innerHTML='<div class="error">Sheet error</div>';
};

function load(){
  const s=document.createElement("script");
  s.src=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:handleSheetResponse`;
  document.body.appendChild(s);
}

load();
setInterval(load,15000);
</script>

</body>
</html>
