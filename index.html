<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(190,210,230,.22);
  --gridStrong:rgba(255,122,0,.45);
  --orange:#ff7a00;
  --white:#f4f7fb;

  --mainBlock:#020202;
  --shipBlock:#07131b;
  --notesBlock:#050505;
  --inspectionBlock:#130f18;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:44px 1fr;
  gap:4px;
  padding:4px;
}

/* TOP BAR */
.top{
  display:grid;
  grid-template-columns:160px 1fr 240px 260px;
  gap:4px;
}

.logo,.announcement,.clock,.weather{
  border:1px solid var(--grid);
  background:#fff;
  overflow:hidden;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
  max-width:150px;
  object-fit:contain;
}

/* ANNOUNCEMENT */
.announcement{
  display:grid;
  grid-template-columns:160px 1fr;
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#000;
  font-weight:700;
  font-size:11px;
  animation:move 65s linear infinite;
}

@keyframes move{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* CLOCK */
.clock{
  display:grid;
  grid-template-rows:1fr 1fr;
}

.clock-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  border-top:1px solid var(--grid);
}

/* WEATHER */
.weather{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:4px 6px;
  font-size:11px;
  font-weight:800;
  color:#000;
  line-height:1.1;
}

.weather-top{
  display:flex;
  align-items:center;
  gap:6px;
}

.weather-bottom{
  font-size:10px;
  font-weight:700;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 7fr 7fr
    10fr 9fr
    10fr 9fr
    9fr 9fr
    12fr 7fr 16fr;

  grid-template-rows:
    18px
    repeat(18,18px)
    18px
    repeat(42,16px);

  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
}

.cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:var(--mainBlock);
  color:var(--white);
  font-weight:800;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
}

.header{
  color:var(--orange);
  font-weight:900;
  font-size:9.5px;
}

.sales-order{
  background:#1e1e1e!important;
  color:#e6e6e6!important;
}

.ship-section{background:var(--shipBlock)}
.notes-section{background:var(--notesBlock)}
.inspect-section{background:var(--inspectionBlock)}

.delay,.p1{background:#ff0000!important;color:#fff!important}
.ontime,.ready{background:#00a83a!important;color:#fff!important}
</style>
</head>

<body>

<div class="screen">

  <div class="top">
    <div class="logo"><img src="GITHUB LOGO.png"></div>

    <div class="announcement">
      <div class="announcement-label">ANNOUNCEMENTS</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="clock">
      <div class="clock-cell" id="dateBox"></div>
      <div class="clock-cell" id="timeBox"></div>
    </div>

    <div class="weather" id="weatherBox">
      <div class="weather-top" id="weatherTop">--</div>
      <div class="weather-bottom" id="weatherBottom">--</div>
    </div>
  </div>

  <div class="board" id="board"></div>

</div>

<script>
const LAT=29.6161;
const LON=-95.5577;

/* CLOCK */
function updateClock(){
  const now=new Date();
  dateBox.textContent=now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  timeBox.textContent=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

/* WEATHER */
function icon(code){
  if(code===0)return"☀️";
  if(code<=2)return"🌤️";
  if(code===3)return"☁️";
  if(code<=67)return"🌧️";
  if(code<=82)return"🌦️";
  if(code<=99)return"⛈️";
  return"🌫️";
}

async function loadWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&windspeed_unit=mph`;
    const res=await fetch(url);
    const data=await res.json();
    const c=data.current;

    weatherTop.textContent=`${icon(c.weather_code)} Stafford ${Math.round(c.temperature_2m)}°F`;
    weatherBottom.textContent=`Humidity ${c.relative_humidity_2m}%  Wind ${Math.round(c.wind_speed_10m)} mph`;

  }catch(e){
    weatherTop.textContent="Weather error";
  }
}

loadWeather();
setInterval(loadWeather,600000);

/* ANNOUNCEMENT SIMPLE */
announceTrack.innerHTML="<span>System Running</span><span>System Running</span>";

</script>

</body>
</html>
