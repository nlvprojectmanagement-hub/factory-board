<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(255,255,255,.12);
  --gridStrong:rgba(255,122,0,.35);
  --orange:#ff6a00;
  --white:#e8e8e8;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:40px 1fr;
  gap:4px;
  padding:4px;
}

.top{
  display:grid;
  grid-template-columns:160px 1fr 260px;
  gap:4px;
}

.logo,.announcement,.clock{
  border:1px solid var(--grid);
  background:#000;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
  max-width:100%;
  object-fit:contain;
}

.announcement{
  display:grid;
  grid-template-columns:160px 1fr;
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#fff;
  font-weight:700;
  font-size:11px;
  animation:move 60s linear infinite;
}

@keyframes move{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.clock{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.clock-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  font-weight:800;
  font-size:11px;
  border-left:1px solid var(--grid);
}

.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 7fr 7fr
    10fr 9fr
    10fr 9fr
    9fr 9fr
    12fr 7fr 16fr;

  grid-template-rows:
    18px
    repeat(18, 18px)
    18px
    repeat(42, 16px);

  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
}

.cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  color:var(--white);
  font-weight:700;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
}

.header{
  color:var(--orange);
  font-weight:900;
  font-size:9.5px;
  text-transform:uppercase;
}

.group-start{
  border-left:1px solid var(--gridStrong);
}

.left{
  justify-content:flex-start;
  padding-left:6px;
}

.sales{
  font-size:11.5px;
  font-weight:900;
}

.delay{background:#ff0000;color:#fff}
.p1{background:#ff0000;color:#fff}
.ontime,.ready{background:#00a83a;color:#fff}
.p2{background:#ff7a00;color:#000}
.pull{background:#ffff00;color:#000}
.pulling{background:#00b0f0;color:#000}
.waiting{color:#aaa}

.struck{
  text-decoration:line-through;
  color:#777!important;
}
</style>
</head>

<body>

<div class="screen">
  <div class="top">
    <div class="logo">
      <img src="Github Logo.png">
    </div>

    <div class="announcement">
      <div class="announcement-label">ANNOUNCEMENTS</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="clock">
      <div class="clock-cell" id="dateBox"></div>
      <div class="clock-cell" id="timeBox"></div>
    </div>
  </div>

  <div class="board" id="board"></div>
</div>

<script>
const CSV_URL="YOUR CSV LINK HERE";

function clean(v){
  return (v||"").toString().trim();
}

function isStruck(v){
  return clean(v).startsWith("**");
}

function display(v){
  return clean(v).replace("**","");
}

function statusClass(t){
  const s=display(t).toUpperCase();
  if(isStruck(t))return"struck";
  if(s.includes("DELAY"))return"delay";
  if(s==="P1")return"p1";
  if(s==="P2")return"p2";
  if(s==="READY")return"ready";
  if(s.includes("ON TIME"))return"ontime";
  return"";
}

function cell(text,row,col,extra=""){
  const d=document.createElement("div");
  d.className="cell "+extra;

  if(col===1)d.classList.add("sales");

  const cls=statusClass(text);
  if(cls)d.classList.add(cls);

  d.style.gridRowStart=row;
  d.style.gridColumnStart=col;

  d.textContent=display(text);
  return d;
}

async function load(){
  const res=await fetch(CSV_URL+"&t="+Date.now());
  const txt=await res.text();

  const rows=txt.split("\n").map(r=>r.split(","));
  const board=document.getElementById("board");
  board.innerHTML="";

  for(let r=1;r<20;r++){
    for(let c=1;c<=13;c++){
      board.appendChild(cell(rows[r]?.[c-1]||"",r+1,c));
    }
  }
}

setInterval(load,3000);
load();
</script>

</body>
</html>
