<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root{
  --bg:#000;
  --grid:rgba(255,255,255,0.24);
  --text:#ff9d00;
  --muted:#cfcfcf;
  --header-grad:linear-gradient(180deg,#6b3e00 0%,#120700 100%);
  --panel-grad:linear-gradient(180deg,#151515 0%,#000 100%);
  --bullet-grad:linear-gradient(180deg,#5a3200 0%,#0a0300 100%);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body {
  padding: 6px;
  background:
    radial-gradient(circle at top left, rgba(255,166,0,0.10), transparent 30%),
    radial-gradient(circle at top right, rgba(255,166,0,0.06), transparent 25%),
    #000;
}

.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 88% 12%;
  gap: 6px;
}

.top {
  display: grid;
  grid-template-columns: 66% 22% 12%;
  gap: 10px;
  min-height: 0;
}

.panel {
  background: var(--panel-grad);
  min-height: 0;
}

table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid var(--grid);
  text-align: center;
  vertical-align: middle;
  color: var(--text);
  font-weight: 700;
}

th {
  font-size: 13px;
  background: var(--header-grad);
  height: 28px;
  padding: 2px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
}

td {
  font-size: 18px;
  background: rgba(0,0,0,0.75);
  height: 30px;
  padding: 0;
}

.cell-inner {
  width: 100%;
  height: 100%;
  min-height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px 4px;
  color: inherit;
  background: transparent;
  font-size: 18px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  text-align: center;
}

/* Main board widths */
.main-table col:nth-child(1) { width: 18%; }
.main-table col:nth-child(2) { width: 16%; }
.main-table col:nth-child(3) { width: 22%; }
.main-table col:nth-child(4) { width: 21%; }
.main-table col:nth-child(5) { width: 23%; }

/* Incoming / Date */
.ship-table col:nth-child(1) { width: 62%; }
.ship-table col:nth-child(2) { width: 38%; }

/* Inspection */
.inspect-table col:nth-child(1) { width: 100%; }

.bulletin-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.bulletin-title {
  border: 1px solid var(--grid);
  border-bottom: none;
  background: var(--bullet-grad);
  color: var(--text);
  font-size: 18px;
  padding: 3px 10px;
  height: 26px;
  display: flex;
  align-items: center;
  font-weight: 700;
}

.bulletin-box {
  border: 1px solid var(--grid);
  display: grid;
  grid-template-rows: repeat(3, 1fr);
  flex: 1;
  min-height: 0;
}

.bulletin-line {
  border-top: 1px solid var(--grid);
  padding: 2px 8px;
  font-size: 14px;
  color: #fff;
  display: flex;
  align-items: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  line-height: 1;
}

.bulletin-line:first-child {
  border-top: none;
}

/* Status colors */
.delay-cell {
  background: #2b0000 !important;
}

.delay-fill {
  width: calc(100% - 4px);
  height: calc(100% - 4px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ff0000;
  color: #fff;
  font-weight: 800;
  animation: flashDelay 0.8s linear infinite;
  text-shadow: 0 0 10px #fff;
  line-height: 1;
}

.ontime-cell {
  background: #00a83a !important;
  color: #fff !important;
}

.risk-cell {
  background: #ffbf00 !important;
  color: #000 !important;
}

@keyframes flashDelay {
  0%   { background:#ff0000; color:#fff; opacity:1; }
  50%  { background:#330000; color:#ff6666; opacity:0.35; }
  100% { background:#ff0000; color:#fff; opacity:1; }
}

.muted {
  color: var(--muted) !important;
}

.error {
  color: red;
  font-size: 24px;
  padding: 20px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">

    <div class="panel">
      <table class="main-table">
        <colgroup><col><col><col><col><col></colgroup>
        <thead><tr id="mainHead"></tr></thead>
        <tbody id="mainBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <table class="ship-table">
        <colgroup><col><col></colgroup>
        <thead><tr id="shipHead"></tr></thead>
        <tbody id="shipBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <table class="inspect-table">
        <colgroup><col></colgroup>
        <thead><tr id="inspectHead"></tr></thead>
        <tbody id="inspectBody"></tbody>
      </table>
    </div>

  </div>

  <div class="bulletin-wrap">
    <div class="bulletin-title">BULLETIN</div>
    <div class="bulletin-box" id="bulletinBox"></div>
  </div>

</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

let isLoading = false;
let lastSnapshot = "";

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function safe(row, idx) {
  return (row && row[idx] !== undefined) ? String(row[idx]).trim() : "";
}

function formatValue(value) {
  const v = String(value || "").trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/i);
  if (!m) return v;
  return `${m[3]}-${monthNames[+m[2]]}`;
}

function getStatus(value) {
  const raw = String(value || "");
  const normalized = raw.toUpperCase().replace(/[\s\-]+/g, "");

  if (normalized.includes("DELAY")) return "delay";
  if (normalized.includes("ONTIME")) return "ontime";
  if (normalized.includes("RISK")) return "risk";

  return "";
}

function isMuted(value) {
  const v = String(value || "").trim().toUpperCase();
  return v === "N/A" || v === "-";
}

function fitText(text, limit) {
  const t = String(text || "").trim();
  if (t.length <= limit) return t;
  return t.slice(0, limit);
}

function makeCell(tag, value, limit = 30) {
  const raw = String(value || "").trim();
  const text = fitText(formatValue(raw), limit);
  const status = getStatus(raw);

  const el = document.createElement(tag);
  const inner = document.createElement("div");
  inner.className = "cell-inner";

  if (status === "delay") {
    el.classList.add("delay-cell");
    inner.classList.add("delay-fill");
  }

  if (status === "ontime") {
    el.classList.add("ontime-cell");
  }

  if (status === "risk") {
    el.classList.add("risk-cell");
  }

  if (!status && isMuted(text)) {
    inner.classList.add("muted");
  }

  inner.textContent = text;
  el.appendChild(inner);
  return el;
}

function render(rows) {
  if (!rows.length) {
    document.body.innerHTML = '<div class="error">No sheet data found.</div>';
    return;
  }

  const snapshot = JSON.stringify(rows);
  if (snapshot === lastSnapshot) return;
  lastSnapshot = snapshot;

  const header = rows[0] || [];
  const dataRows = rows.slice(1);

  const bulletinIndex = dataRows.findIndex(r => safe(r, 0).toUpperCase() === "BULLETIN");
  const upperRows = bulletinIndex >= 0 ? dataRows.slice(0, bulletinIndex) : dataRows;
  const bulletinRows = bulletinIndex >= 0 ? dataRows.slice(bulletinIndex + 1, bulletinIndex + 4) : [];

  const mainHead = document.getElementById("mainHead");
  const shipHead = document.getElementById("shipHead");
  const inspectHead = document.getElementById("inspectHead");
  const mainBody = document.getElementById("mainBody");
  const shipBody = document.getElementById("shipBody");
  const inspectBody = document.getElementById("inspectBody");

  mainHead.innerHTML = "";
  shipHead.innerHTML = "";
  inspectHead.innerHTML = "";
  mainBody.innerHTML = "";
  shipBody.innerHTML = "";
  inspectBody.innerHTML = "";

  [0,1,2,3,4].forEach(i => mainHead.appendChild(makeCell("th", safe(header, i), 22)));
  [6,7].forEach(i => shipHead.appendChild(makeCell("th", safe(header, i), 18)));
  inspectHead.appendChild(makeCell("th", safe(header, 9), 14));

  const rowCount = Math.max(upperRows.length, 18);

  for (let r = 0; r < rowCount; r++) {
    const row = upperRows[r] || [];

    const trMain = document.createElement("tr");
    [0,1,2,3,4].forEach(i => trMain.appendChild(makeCell("td", safe(row, i), 24)));
    mainBody.appendChild(trMain);

    const trShip = document.createElement("tr");
    [6,7].forEach(i => trShip.appendChild(makeCell("td", safe(row, i), 18)));
    shipBody.appendChild(trShip);

    const trInspect = document.createElement("tr");
    trInspect.appendChild(makeCell("td", safe(row, 9), 14));
    inspectBody.appendChild(trInspect);
  }

  const bulletinBox = document.getElementById("bulletinBox");
  bulletinBox.innerHTML = "";

  for (let i = 0; i < 3; i++) {
    const row = bulletinRows[i] || [];
    const parts = row
      .map(v => formatValue(v))
      .filter(v => String(v).trim() !== "");

    const line = document.createElement("div");
    line.className = "bulletin-line";
    line.textContent = parts.join("   ");
    bulletinBox.appendChild(line);
  }
}

async function load() {
  if (isLoading) return;
  isLoading = true;

  try {
    const res = await fetch(csvUrl + "&t=" + Date.now(), { cache: "no-store" });
    const text = await res.text();
    const rows = parseCSV(text);
    render(rows);
  } catch (e) {
    document.body.innerHTML = '<div class="error">Error loading</div>';
  }

  isLoading = false;
}

load();
setInterval(load, 10000);
</script>

</body>
</html>
