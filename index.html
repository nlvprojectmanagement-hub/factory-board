<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>
<style>
  * { box-sizing: border-box; }

  :root{
    --bg:#000;
    --grid:rgba(255,255,255,0.22);
    --text:#ff9d00;
    --muted:#cfcfcf;
    --header-grad:linear-gradient(180deg,#6b3e00 0%,#120700 100%);
    --panel-grad:linear-gradient(180deg,#151515 0%,#000 100%);
    --bullet-grad:linear-gradient(180deg,#5a3200 0%,#0a0300 100%);
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  body {
    padding: 8px;
    background:
      radial-gradient(circle at top left, rgba(255,166,0,0.10), transparent 30%),
      radial-gradient(circle at top right, rgba(255,166,0,0.06), transparent 25%),
      #000;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-rows: 86% 14%;
    gap: 12px;
  }

  .top {
    display: grid;
    grid-template-columns: 71% 21.5% 7.5%;
    gap: 16px;
    min-height: 0;
  }

  .panel {
    background: var(--panel-grad);
    min-height: 0;
  }

  table {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    border: 1px solid var(--grid);
    text-align: center;
    vertical-align: middle;
    padding: 6px;
    color: var(--text);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  th {
    font-size: 18px;
    background: var(--header-grad);
    height: 36px;
  }

  td {
    font-size: 18px;
    background: rgba(0,0,0,0.75);
    height: 39px;
  }

  .bulletin-wrap {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .bulletin-title {
    border: 1px solid var(--grid);
    border-bottom: none;
    background: var(--bullet-grad);
    color: var(--text);
    font-size: 22px;
    padding: 6px 12px;
    height: 40px;
    display: flex;
    align-items: center;
    font-weight: 700;
  }

  .bulletin-box {
    border: 1px solid var(--grid);
    display: grid;
    grid-template-rows: repeat(3, 1fr);
    min-height: 0;
    flex: 1;
  }

  .bulletin-line {
    border-top: 1px solid var(--grid);
    padding: 6px 12px;
    font-size: 20px;
    color: #fff;
    display: flex;
    align-items: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bulletin-line:first-child {
    border-top: none;
  }

  .delay {
    color: #fff !important;
    background: #ff0000 !important;
    animation: blink 0.7s infinite;
    text-shadow: 0 0 12px #fff;
  }

  @keyframes blink {
    0%   { background:#ff0000; color:#fff; }
    50%  { background:#000; color:#ff0000; }
    100% { background:#ff0000; color:#fff; }
  }

  .muted {
    color: var(--muted) !important;
  }

  .error {
    color: red;
    font-size: 24px;
    padding: 20px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <div class="panel">
        <table>
          <thead><tr id="mainHead"></tr></thead>
          <tbody id="mainBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <table>
          <thead><tr id="shipHead"></tr></thead>
          <tbody id="shipBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <table>
          <thead><tr id="inspectHead"></tr></thead>
          <tbody id="inspectBody"></tbody>
        </table>
      </div>
    </div>

    <div class="bulletin-wrap">
      <div class="bulletin-title">BULLETIN</div>
      <div class="bulletin-box" id="bulletinBox"></div>
    </div>
  </div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

let isLoading = false;
let lastRendered = "";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function safe(row, idx) {
  return (row && row[idx] !== undefined) ? String(row[idx]).trim() : "";
}

function cls(value) {
  const v = String(value || "").trim().toUpperCase();
  if (v.includes("DELAY")) return "delay";
  if (v === "N/A" || v === "-") return "muted";
  return "";
}

function makeCell(tag, value) {
  const el = document.createElement(tag);
  el.textContent = value || "";
  const c = cls(value);
  if (c) el.classList.add(c);
  return el;
}

function render(rows) {
  if (!rows.length) {
    document.body.innerHTML = '<div class="error">No sheet data found.</div>';
    return;
  }

  const snapshot = JSON.stringify(rows);
  if (snapshot === lastRendered) return;
  lastRendered = snapshot;

  const header = rows[0] || [];
  const dataRows = rows.slice(1);

  const bulletinIndex = dataRows.findIndex(r => safe(r, 0).toUpperCase() === "BULLETIN");
  const upperRows = bulletinIndex >= 0 ? dataRows.slice(0, bulletinIndex) : dataRows;
  const bulletinRows = bulletinIndex >= 0 ? dataRows.slice(bulletinIndex + 1, bulletinIndex + 4) : [];

  const mainHead = document.getElementById("mainHead");
  const shipHead = document.getElementById("shipHead");
  const inspectHead = document.getElementById("inspectHead");
  const mainBody = document.getElementById("mainBody");
  const shipBody = document.getElementById("shipBody");
  const inspectBody = document.getElementById("inspectBody");

  mainHead.innerHTML = "";
  shipHead.innerHTML = "";
  inspectHead.innerHTML = "";
  mainBody.innerHTML = "";
  shipBody.innerHTML = "";
  inspectBody.innerHTML = "";

  [0,1,2,3,4].forEach(i => mainHead.appendChild(makeCell("th", safe(header, i))));
  [6,7].forEach(i => shipHead.appendChild(makeCell("th", safe(header, i))));
  inspectHead.appendChild(makeCell("th", safe(header, 9)));

  const rowCount = Math.max(upperRows.length, 11);

  for (let r = 0; r < rowCount; r++) {
    const row = upperRows[r] || [];

    const trMain = document.createElement("tr");
    [0,1,2,3,4].forEach(i => trMain.appendChild(makeCell("td", safe(row, i))));
    mainBody.appendChild(trMain);

    const trShip = document.createElement("tr");
    [6,7].forEach(i => trShip.appendChild(makeCell("td", safe(row, i))));
    shipBody.appendChild(trShip);

    const trInspect = document.createElement("tr");
    trInspect.appendChild(makeCell("td", safe(row, 9)));
    inspectBody.appendChild(trInspect);
  }

  const bulletinBox = document.getElementById("bulletinBox");
  bulletinBox.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const row = bulletinRows[i] || [];
    const parts = row.filter(v => String(v).trim() !== "");
    const line = document.createElement("div");
    line.className = "bulletin-line";
    line.textContent = parts.join("   ");
    bulletinBox.appendChild(line);
  }
}

async function loadData() {
  if (isLoading) return;
  isLoading = true;

  try {
    const res = await fetch(csvUrl + "&t=" + Date.now(), { cache: "no-store" });
    const text = await res.text();
    const rows = parseCSV(text);
    render(rows);
  } catch (e) {
    document.body.innerHTML = '<div class="error">Error loading sheet.</div>';
  } finally {
    isLoading = false;
  }
}

loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
