<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  overflow:hidden;
}

.container{
  display:flex;
  height:92vh;
}

.left{ width:70%; }
.mid{ width:15%; }
.right{ width:15%; }

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid rgba(255,255,255,0.2);
  text-align:center;
  color:#f0a100;
  font-weight:700;
  overflow:hidden;
}

th{
  background:linear-gradient(#7a4700,#120700);
  font-size:14px;
  height:28px;
}

td{
  font-size:18px;
  height:28px;
}

.cell{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* STATUS */
.delay{
  background:red;
  color:#fff;
  animation:flash 0.8s infinite;
}

.ontime{
  background:#00a83a;
  color:#fff;
}

@keyframes flash{
  0%{opacity:1}
  50%{opacity:.3}
  100%{opacity:1}
}

/* BULLETIN */
#bulletin{
  height:8vh;
  background:linear-gradient(#7a4700,#120700);
  color:#f0a100;
  display:flex;
  align-items:center;
  padding-left:10px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <table>
      <thead><tr id="mainHead"></tr></thead>
      <tbody id="mainBody"></tbody>
    </table>
  </div>

  <div class="mid">
    <table>
      <thead><tr id="shipHead"></tr></thead>
      <tbody id="shipBody"></tbody>
    </table>
  </div>

  <div class="right">
    <table>
      <thead><tr id="inspHead"></tr></thead>
      <tbody id="inspBody"></tbody>
    </table>
  </div>

</div>

<div id="bulletin">BULLETIN</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text){
  return text.split("\n").map(r=>r.split(","));
}

function clean(v){
  if(!v) return "";
  v=v.trim();
  const m=v.match(/Date\((\d+),(\d+),(\d+)/);
  if(m) return `${m[3]}-${months[+m[2]]}`;
  return v;
}

function status(v){
  const s=v.toUpperCase().replace(/[\s\-]/g,"");
  if(s.includes("DELAY")) return "delay";
  if(s.includes("ONTIME")) return "ontime";
  return "";
}

function cell(tag,val){
  const el=document.createElement(tag);
  const d=document.createElement("div");
  d.className="cell";
  const t=clean(val);
  const st=status(t);
  if(st) d.classList.add(st);
  d.textContent=t;
  el.appendChild(d);
  return el;
}

function render(data){

  // MAIN TABLE (A–E)
  const mh=document.getElementById("mainHead");
  const mb=document.getElementById("mainBody");

  mh.innerHTML="";
  mb.innerHTML="";

  data[0].slice(0,5).forEach(h=>mh.appendChild(cell("th",h)));

  data.slice(1).forEach(r=>{
    const tr=document.createElement("tr");
    for(let i=0;i<5;i++){
      tr.appendChild(cell("td",r[i]));
    }
    mb.appendChild(tr);
  });

  // SHIPMENTS (G–H)
  const sh=document.getElementById("shipHead");
  const sb=document.getElementById("shipBody");

  sh.innerHTML="";
  sb.innerHTML="";

  [6,7].forEach(i=>sh.appendChild(cell("th",data[0][i])));

  data.slice(1).forEach(r=>{
    const tr=document.createElement("tr");
    [6,7].forEach(i=>tr.appendChild(cell("td",r[i])));
    sb.appendChild(tr);
  });

  // INSPECTION (J)
  const ih=document.getElementById("inspHead");
  const ib=document.getElementById("inspBody");

  ih.innerHTML="";
  ib.innerHTML="";

  ih.appendChild(cell("th",data[0][9]));

  data.slice(1).forEach(r=>{
    const tr=document.createElement("tr");
    tr.appendChild(cell("td",r[9]));
    ib.appendChild(tr);
  });
}

async function load(){
  const res=await fetch(URL+"&t="+Date.now());
  const text=await res.text();
  const data=parseCSV(text);
  render(data);
}

load();
setInterval(load,8000);
</script>

</body>
</html>
