<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #000;
  --grid: rgba(255,255,255,0.20);
  --grid-strong: rgba(255,255,255,0.30);
  --text: #f0a100;
  --muted: #cfcfcf;
  --header-grad: linear-gradient(180deg, #7a4700 0%, #2b1700 50%, #120700 100%);
  --panel-grad: linear-gradient(180deg, #101010 0%, #000000 100%);
  --bullet-grad: linear-gradient(180deg, #6a3a00 0%, #180a00 100%);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  background:
    radial-gradient(circle at top left, rgba(255,166,0,0.08), transparent 28%),
    radial-gradient(circle at top right, rgba(255,166,0,0.04), transparent 22%),
    #000;
}

#viewport {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #000;
}

#scaleWrapper {
  position: absolute;
  left: 0;
  top: 0;
  width: 1366px;
  height: 768px;
  transform-origin: top left;
  padding: 4px;
}

.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 90% 10%;
  gap: 4px;
}

.top {
  display: grid;
  grid-template-columns: 62% 16% 12% 10%;
  gap: 6px;
  min-height: 0;
}

.panel {
  min-height: 0;
  background: var(--panel-grad);
  box-shadow:
    inset 0 0 0 1px rgba(255,166,0,0.04),
    inset 0 0 20px rgba(255,255,255,0.01);
}

table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid var(--grid);
  text-align: center;
  vertical-align: middle;
  color: var(--text);
  font-weight: 700;
}

th {
  height: 24px;
  padding: 1px 3px;
  font-size: 11px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  background: var(--header-grad);
  border-color: var(--grid-strong);
}

td {
  height: 21px;
  padding: 0;
  font-size: 14px;
  background: rgba(0,0,0,0.82);
}

.cell {
  width: 100%;
  height: 100%;
  min-height: 21px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1px 3px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  color: inherit;
  background: transparent;
}

.cell.left {
  justify-content: flex-start;
  padding-left: 5px;
}

.delay-cell {
  background: #240000 !important;
}

.delay-fill {
  width: calc(100% - 2px);
  height: calc(100% - 2px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ff0000;
  color: #fff;
  font-weight: 900;
  animation: flashDelay 0.65s linear infinite;
}

@keyframes flashDelay {
  0%   { background: #ff0000; }
  50%  { background: #320000; }
  100% { background: #ff0000; }
}

.ontime-cell {
  background: #00a83a !important;
  color: #fff !important;
}

.risk-cell {
  background: #ffbf00 !important;
  color: #000 !important;
}

.muted {
  color: var(--muted) !important;
}

.bulletin-wrap {
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.bulletin-title {
  height: 22px;
  display: flex;
  align-items: center;
  padding: 1px 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  background: var(--bullet-grad);
  border: 1px solid var(--grid-strong);
  border-bottom: none;
}

.bulletin-box {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-rows: repeat(4, 1fr);
  border: 1px solid var(--grid);
  background: rgba(0,0,0,0.82);
}

.bulletin-line {
  display: flex;
  align-items: center;
  padding: 1px 8px;
  font-size: 12px;
  color: #fff;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  border-top: 1px solid rgba(255,255,255,0.18);
}

.bulletin-line:first-child {
  border-top: none;
}

.error {
  color: red;
  font-size: 18px;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<div id="viewport">
  <div id="scaleWrapper">
    <div class="screen">

      <div class="top">
        <div class="panel">
          <table>
            <thead><tr id="head1"></tr></thead>
            <tbody id="body1"></tbody>
          </table>
        </div>

        <div class="panel">
          <table>
            <thead><tr id="head2"></tr></thead>
            <tbody id="body2"></tbody>
          </table>
        </div>

        <div class="panel">
          <table>
            <thead><tr id="head3"></tr></thead>
            <tbody id="body3"></tbody>
          </table>
        </div>

        <div class="panel">
          <table>
            <thead><tr id="head4"></tr></thead>
            <tbody id="body4"></tbody>
          </table>
        </div>
      </div>

      <div class="bulletin-wrap">
        <div class="bulletin-title" id="bulletinTitle">BULLETIN</div>
        <div class="bulletin-box" id="bulletinBox"></div>
      </div>

    </div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const BASE_W = 1366;
const BASE_H = 768;
const REFRESH_MS = 8000;
const MIN_VISIBLE_ROWS = 18;
const BULLETIN_LINES = 4;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function fitToScreen() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scaleX = vw / BASE_W;
  const scaleY = vh / BASE_H;
  const scale = Math.min(scaleX, scaleY);
  const scaledW = BASE_W * scale;
  const scaledH = BASE_H * scale;
  const left = (vw - scaledW) / 2;
  const top = (vh - scaledH) / 2;
  const wrapper = document.getElementById("scaleWrapper");
  wrapper.style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
}
window.addEventListener("resize", fitToScreen);
fitToScreen();

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function safe(row, idx) {
  return row && row[idx] !== undefined ? String(row[idx]).trim() : "";
}

function clean(value) {
  if (value == null) return "";
  const v = String(value).trim();
  const m = v.match(/^Date\((\d+),(\d+),(\d+)/);
  if (m) return `${m[3]}-${MONTHS[+m[2]]}`;
  return v;
}

function getStatus(value) {
  const normalized = String(value || "").toUpperCase().replace(/[\s\-]+/g, "");
  if (normalized.includes("DELAY")) return "delay";
  if (normalized.includes("ONTIME")) return "ontime";
  if (normalized.includes("RISK")) return "risk";
  return "";
}

function isMuted(value) {
  const t = String(value || "").trim().toUpperCase();
  return t === "N/A" || t === "-";
}

function detectSections(headerRow) {
  const sections = [];
  let start = null;

  for (let i = 0; i <= headerRow.length; i++) {
    const value = i < headerRow.length ? clean(headerRow[i]) : "";
    const filled = value !== "";

    if (filled && start === null) start = i;
    if ((!filled || i === headerRow.length) && start !== null) {
      sections.push({ start, end: i - 1, title: clean(headerRow[start]) });
      start = null;
    }
  }

  return sections;
}

function makeCell(tag, value, leftAlign = false) {
  const raw = String(value || "").trim();
  const txt = clean(raw);
  const status = getStatus(raw);

  const el = document.createElement(tag);

  if (status === "delay") {
    el.classList.add("delay-cell");
    const fill = document.createElement("div");
    fill.className = "delay-fill";
    fill.textContent = txt;
    el.appendChild(fill);
    return el;
  }

  if (status === "ontime") el.classList.add("ontime-cell");
  if (status === "risk") el.classList.add("risk-cell");

  const d = document.createElement("div");
  d.className = "cell" + (leftAlign ? " left" : "");
  if (!status && isMuted(txt)) d.classList.add("muted");
  d.textContent = txt;
  el.appendChild(d);
  return el;
}

function clearSection(n) {
  document.getElementById(`head${n}`).innerHTML = "";
  document.getElementById(`body${n}`).innerHTML = "";
}

function renderSection(n, headerRow, rows, section, leftAlign = false) {
  const head = document.getElementById(`head${n}`);
  const body = document.getElementById(`body${n}`);
  head.innerHTML = "";
  body.innerHTML = "";

  for (let c = section.start; c <= section.end; c++) {
    head.appendChild(makeCell("th", headerRow[c], leftAlign));
  }

  const rowCount = Math.max(rows.length, MIN_VISIBLE_ROWS);

  for (let r = 0; r < rowCount; r++) {
    const row = rows[r] || [];
    const tr = document.createElement("tr");

    for (let c = section.start; c <= section.end; c++) {
      tr.appendChild(makeCell("td", row[c], leftAlign));
    }

    body.appendChild(tr);
  }
}

function renderBulletin(rows, title = "BULLETIN") {
  document.getElementById("bulletinTitle").textContent = title;
  const box = document.getElementById("bulletinBox");
  box.innerHTML = "";

  for (let i = 0; i < BULLETIN_LINES; i++) {
    const row = rows[i] || [];
    const parts = row.map(clean).filter(v => v !== "");
    const line = document.createElement("div");
    line.className = "bulletin-line";
    line.textContent = parts.join("   ");
    box.appendChild(line);
  }
}

function render(data) {
  if (!data || data.length < 2) {
    document.body.innerHTML = '<div class="error">NO DATA</div>';
    return;
  }

  const header = data[0];
  const rows = data.slice(1);
  const sections = detectSections(header);

  const bulletinSection = sections.find(s => s.title.toUpperCase().includes("BULLETIN"));
  const nonBulletSections = sections.filter(s => !s.title.toUpperCase().includes("BULLETIN"));

  clearSection(1);
  clearSection(2);
  clearSection(3);
  clearSection(4);

  for (let i = 0; i < 4; i++) {
    const section = nonBulletSections[i];
    if (!section) continue;

    const leftAlign = i >= 2;
    renderSection(i + 1, header, rows, section, leftAlign);
  }

  if (bulletinSection) {
    const bulletinRows = rows.map(r => r.slice(bulletinSection.start, bulletinSection.end + 1));
    renderBulletin(bulletinRows, bulletinSection.title || "BULLETIN");
  } else {
    const fallbackIndex = rows.findIndex(r => clean(r[0]).toUpperCase() === "BULLETIN");
    const bulletinRows = fallbackIndex >= 0 ? rows.slice(fallbackIndex + 1, fallbackIndex + 1 + BULLETIN_LINES) : [];
    renderBulletin(bulletinRows, "BULLETIN");
  }
}

async function load() {
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now(), { cache: "no-store" });
    const text = await res.text();
    const data = parseCSV(text);
    render(data);
    fitToScreen();
  } catch (e) {
    document.body.innerHTML = '<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load, REFRESH_MS);
</script>

</body>
</html>
