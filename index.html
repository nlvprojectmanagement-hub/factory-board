<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.screen {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: 90% 10%;
  gap: 6px;
  padding: 6px;
}

.top {
  display: grid;
  grid-template-columns: 65% 23% 12%;
  gap: 8px;
}

table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid rgba(255,255,255,0.25);
  text-align: center;
  color: #f0a100;
  font-weight: bold;
}

th {
  background: linear-gradient(#7a4700,#120700);
  font-size: 12px;
  height: 24px;
  white-space: nowrap;
}

td {
  height: 24px;
  font-size: 16px;
}

.cell {
  width: 100%;
  height: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* STATUS */
.delay {
  background: red;
  color: #fff;
  animation: flash 0.8s infinite;
}

@keyframes flash {
  0% {opacity:1;}
  50% {opacity:0.3;}
  100% {opacity:1;}
}

.ontime {
  background: #00a83a;
  color: #fff;
}

/* BULLETIN */
.bulletin {
  border:1px solid rgba(255,255,255,0.3);
  display:flex;
  flex-direction:column;
}

.bulletin-title {
  background: linear-gradient(#7a4700,#120700);
  padding:4px 10px;
  font-weight:bold;
}

.bulletin-line {
  flex:1;
  border-top:1px solid rgba(255,255,255,0.2);
  padding:4px 10px;
  display:flex;
  align-items:center;
  font-size:14px;
}

.error {
  color:red;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="body"></tbody>
    </table>

    <table>
      <thead><tr id="head2"></tr></thead>
      <tbody id="body2"></tbody>
    </table>

    <table>
      <thead><tr id="head3"></tr></thead>
      <tbody id="body3"></tbody>
    </table>
  </div>

  <div class="bulletin">
    <div class="bulletin-title">BULLETIN</div>
    <div id="bulletin"></div>
  </div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

function parseCSV(text){
  return text.trim().split("\n").map(r => r.split(","));
}

function format(val){
  const m = val.match(/Date\((\d+),(\d+),(\d+)/);
  if(!m) return val;
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return m[3]+"-"+months[m[2]];
}

function status(val){
  const v = val.toUpperCase();
  if(v.includes("DELAY")) return "delay";
  if(v.includes("ON TIME")||v.includes("ONTIME")) return "ontime";
  return "";
}

function makeCell(tag,val){
  const el=document.createElement(tag);
  const div=document.createElement("div");
  div.className="cell";

  const s=status(val);
  if(s) div.classList.add(s);

  div.textContent=format(val);
  el.appendChild(div);
  return el;
}

async function load(){
  try{
    const res=await fetch(URL+"?t="+Date.now());
    const txt=await res.text();
    const rows=parseCSV(txt);

    const head=document.getElementById("head");
    const body=document.getElementById("body");
    const head2=document.getElementById("head2");
    const body2=document.getElementById("body2");
    const head3=document.getElementById("head3");
    const body3=document.getElementById("body3");
    const bulletin=document.getElementById("bulletin");

    head.innerHTML="";
    body.innerHTML="";
    head2.innerHTML="";
    body2.innerHTML="";
    head3.innerHTML="";
    body3.innerHTML="";
    bulletin.innerHTML="";

    const h=rows[0];

    [0,1,2,3,4].forEach(i=>head.appendChild(makeCell("th",h[i])));
    [6,7].forEach(i=>head2.appendChild(makeCell("th",h[i])));
    head3.appendChild(makeCell("th",h[9]));

    const data=rows.slice(1);

    let bulletinIndex=data.findIndex(r=>r[0]=="BULLETIN");
    let mainRows=bulletinIndex>=0?data.slice(0,bulletinIndex):data;
    let bulletRows=bulletinIndex>=0?data.slice(bulletinIndex+1,bulletinIndex+5):[];

    for(let i=0;i<20;i++){
      let r=mainRows[i]||[];

      let tr=document.createElement("tr");
      [0,1,2,3,4].forEach(c=>tr.appendChild(makeCell("td",r[c]||"")));
      body.appendChild(tr);

      let tr2=document.createElement("tr");
      [6,7].forEach(c=>tr2.appendChild(makeCell("td",r[c]||"")));
      body2.appendChild(tr2);

      let tr3=document.createElement("tr");
      tr3.appendChild(makeCell("td",r[9]||""));
      body3.appendChild(tr3);
    }

    bulletRows.forEach(r=>{
      let d=document.createElement("div");
      d.className="bulletin-line";
      d.textContent=r.join(" ");
      bulletin.appendChild(d);
    });

  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,10000);
</script>

</body>
</html>
