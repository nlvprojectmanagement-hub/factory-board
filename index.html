<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#000;
  --grid:rgba(190,210,230,.22);
  --gridStrong:rgba(255,122,0,.45);
  --orange:#ff7a00;
  --white:#f4f7fb;

  --mainBlock:#020202;
  --shipBlock:#07131b;
  --notesBlock:#050505;
  --inspectionBlock:#130f18;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:40px 1fr;
  gap:4px;
  padding:4px;
}

/* TOP (WHITE BACKGROUND) */
.top{
  display:grid;
  grid-template-columns:160px 1fr 260px;
  gap:4px;
}

.logo,.announcement,.clock{
  border:1px solid var(--grid);
  background:#ffffff;
  overflow:hidden;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-height:34px;
  max-width:150px;
  object-fit:contain;
}

.announcement{
  display:grid;
  grid-template-columns:160px 1fr;
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
  background:#ffffff;
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
  background:#ffffff;
}

.marquee-track{
  display:inline-flex;
  gap:120px;
  white-space:nowrap;
  color:#000;
  font-weight:700;
  font-size:11px;
  animation:move 65s linear infinite;
  will-change:transform;
}

@keyframes move{
  from{transform:translate3d(100%,0,0)}
  to{transform:translate3d(-100%,0,0)}
}

.clock{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.clock-cell{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  border-left:1px solid var(--grid);
  background:#ffffff;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:
    7fr 7fr 7fr 7fr
    10fr 9fr
    10fr 9fr
    9fr 9fr
    12fr 7fr 16fr;

  grid-template-rows:
    18px
    repeat(18,18px)
    18px
    repeat(42,16px);

  align-content:start;
  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
  background:#000;
}

.cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  background:var(--mainBlock);
  color:var(--white);
  font-weight:800;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
}

.header{
  background:#000!important;
  color:var(--orange);
  font-weight:900;
  font-size:9.5px;
  text-transform:uppercase;
}

.group-start{
  border-left:1px solid var(--gridStrong);
}

.ship-section{background:var(--shipBlock);}
.notes-section{background:var(--notesBlock);}
.inspect-section{background:var(--inspectionBlock);}

.left{justify-content:flex-start;padding-left:6px;}
.sales-entry{font-size:11.5px;font-weight:900;}

.struck{text-decoration:line-through;color:#777!important;}

.delay{background:#ff0000!important;color:#fff!important;}
.p1{background:#ff0000!important;color:#fff!important;}

.ontime,.ready{background:#00a83a!important;color:#fff!important;}
.p2{background:#ff7a00!important;color:#000!important;}
.pull{background:#ffff00!important;color:#000!important;}
.pulling{background:#00b0f0!important;color:#000!important;}
.waiting{color:#b8b8b8!important;}

.released{color:#00ff88!important;}
.partial{color:#ffff00!important;}
.hold,.notreleased{color:#ff3333!important;}
.review,.revision,.clarification{color:#00b0f0!important;}

.error{
  color:red;
  font-size:22px;
  font-weight:900;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">
  <div class="top">
    <div class="logo">
      <img src="GITHUB LOGO.png">
    </div>

    <div class="announcement">
      <div class="announcement-label">ANNOUNCEMENTS</div>
      <div class="marquee">
        <div class="marquee-track" id="announceTrack">
          <span></span><span></span>
        </div>
      </div>
    </div>

    <div class="clock">
      <div class="clock-cell" id="dateBox"></div>
      <div class="clock-cell" id="timeBox"></div>
    </div>
  </div>

  <div class="board" id="board"></div>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";
const REFRESH_MS=3000;

function updateClock(){
  const now=new Date();
  document.getElementById("dateBox").textContent =
    now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  document.getElementById("timeBox").textContent =
    now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

async function load(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now(),{cache:"no-store"});
    const text=await res.text();

    document.getElementById("announceTrack").innerHTML =
      "<span>"+text.slice(0,120)+"</span><span>"+text.slice(0,120)+"</span>";

  }catch(e){
    document.body.innerHTML='<div class="error">LOAD ERROR</div>';
  }
}

load();
setInterval(load,REFRESH_MS);
</script>

</body>
</html>
