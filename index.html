<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Factory Board</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    #board {
      width: 100%;
      min-height: 100vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #888;
      padding: 12px;
      text-align: center;
      color: #ff9d00;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delay {
      color: white;
      background: red;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { background: red; color: white; }
      50% { background: black; color: red; }
      100% { background: red; color: white; }
    }

    .error {
      padding: 20px;
      color: red;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="board">Loading...</div>

  <script>
    const sheetId = "1ML2ozfDmFhVqVetf0zNlrJRfnvfQZ_xrUP-gLN80XQ8";
    const gid = "0";

    let lastRendered = "";
    let isLoading = false;
    let timeoutId = null;

    function renderTable(table) {
      const cols = table.cols || [];
      const rows = table.rows || [];

      let html = "<table><tr>";

      cols.forEach(col => {
        html += `<th>${col.label || ""}</th>`;
      });

      html += "</tr>";

      rows.forEach(row => {
        html += "<tr>";

        (row.c || []).forEach(cell => {
          const value = cell && cell.v != null ? String(cell.v) : "";
          const cls = value.trim().toUpperCase() === "DELAY" ? "delay" : "";
          html += `<td class="${cls}">${value}</td>`;
        });

        html += "</tr>";
      });

      html += "</table>";

      if (html !== lastRendered) {
        document.getElementById("board").innerHTML = html;
        lastRendered = html;
      }
    }

    window.handleSheetResponse = function(response) {
      clearTimeout(timeoutId);
      isLoading = false;

      if (response && response.table) {
        renderTable(response.table);
      } else {
        document.getElementById("board").innerHTML =
          '<div class="error">Could not read sheet data.</div>';
      }
    };

    function loadData() {
      if (isLoading) return;
      isLoading = true;

      const oldScript = document.getElementById("sheet-script");
      if (oldScript) oldScript.remove();

      timeoutId = setTimeout(() => {
        isLoading = false;
        document.getElementById("board").innerHTML =
          '<div class="error">Sheet load timed out.</div>';
      }, 8000);

      const script = document.createElement("script");
      script.id = "sheet-script";
      script.src =
        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}` +
        `&tqx=responseHandler:handleSheetResponse;out:json&t=${Date.now()}`;

      script.onerror = function() {
        clearTimeout(timeoutId);
        isLoading = false;
        document.getElementById("board").innerHTML =
          '<div class="error">Error loading sheet.</div>';
      };

      document.body.appendChild(script);
    }

    loadData();
    setInterval(loadData, 15000);
  </script>
</body>
</html>
