<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory Board</title>

<style>
* { box-sizing: border-box; }

:root{
  --bg:#000;
  --grid:rgba(255,255,255,0.22);
  --text:#ff9d00;
  --muted:#cfcfcf;
  --header-grad:linear-gradient(180deg,#6b3e00 0%,#120700 100%);
  --panel-grad:linear-gradient(180deg,#151515 0%,#000 100%);
  --bullet-grad:linear-gradient(180deg,#5a3200 0%,#0a0300 100%);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body {
  padding: 8px;
  background:
    radial-gradient(circle at top left, rgba(255,166,0,0.10), transparent 30%),
    radial-gradient(circle at top right, rgba(255,166,0,0.06), transparent 25%),
    #000;
}

.screen {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 86% 14%;
  gap: 12px;
}

.top {
  display: grid;
  grid-template-columns: 71% 21.5% 7.5%;
  gap: 16px;
}

.panel {
  background: var(--panel-grad);
}

table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid var(--grid);
  text-align: center;
  padding: 6px;
  color: var(--text);
  font-weight: 700;
}

th {
  font-size: 18px;
  background: var(--header-grad);
}

td {
  font-size: 18px;
  background: rgba(0,0,0,0.75);
}

.bulletin-wrap {
  display: flex;
  flex-direction: column;
}

.bulletin-title {
  border: 1px solid var(--grid);
  border-bottom: none;
  background: var(--bullet-grad);
  color: var(--text);
  font-size: 22px;
  padding: 6px 12px;
}

.bulletin-box {
  border: 1px solid var(--grid);
  display: grid;
  grid-template-rows: repeat(3, 1fr);
}

.bulletin-line {
  border-top: 1px solid var(--grid);
  padding: 6px 12px;
  font-size: 20px;
  color: #fff;
}

/* STATUS COLORS */

.delay-text {
  display:block;
  background:#ff0000;
  color:#fff;
  animation:flashDelay 0.8s steps(1,end) infinite;
}

.ontime-text {
  display:block;
  background:#00a83a;
  color:#fff;
  animation:flashOnTime 0.8s steps(1,end) infinite;
}

.risk-text {
  display:block;
  background:#ffbf00;
  color:#000;
  animation:flashRisk 0.8s steps(1,end) infinite;
}

@keyframes flashDelay {
  0%{background:#ff0000;}
  50%{background:#000;}
  100%{background:#ff0000;}
}

@keyframes flashOnTime {
  0%{background:#00a83a;}
  50%{background:#000;}
  100%{background:#00a83a;}
}

@keyframes flashRisk {
  0%{background:#ffbf00;}
  50%{background:#000;}
  100%{background:#ffbf00;}
}

.muted { color: var(--muted); }

.error {
  color:red;
  font-size:24px;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

<div class="top">

<div class="panel">
<table>
<thead><tr id="mainHead"></tr></thead>
<tbody id="mainBody"></tbody>
</table>
</div>

<div class="panel">
<table>
<thead><tr id="shipHead"></tr></thead>
<tbody id="shipBody"></tbody>
</table>
</div>

<div class="panel">
<table>
<thead><tr id="inspectHead"></tr></thead>
<tbody id="inspectBody"></tbody>
</table>
</div>

</div>

<div class="bulletin-wrap">
<div class="bulletin-title">BULLETIN</div>
<div class="bulletin-box" id="bulletinBox"></div>
</div>

</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

let isLoading = false;
let lastRendered = "";

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseCSV(text) {
  return text.trim().split("\n").map(r => r.split(","));
}

function formatDate(val){
  const m = val.match(/^Date\((\d+),(\d+),(\d+)/);
  if(!m) return val;
  return m[3] + "-" + monthNames[+m[2]];
}

function getStatus(v){
  v = v.toUpperCase();
  if(v.includes("DELAY")) return "delay";
  if(v.includes("ON-TIME")||v.includes("ON TIME")) return "ontime";
  if(v.includes("RISK")) return "risk";
  return "";
}

function makeCell(tag,val){
  val = val || "";
  val = formatDate(val);

  const el = document.createElement(tag);
  const status = getStatus(val);

  if(status){
    const span = document.createElement("span");
    span.className = status + "-text";
    span.textContent = val;
    el.appendChild(span);
  } else {
    el.textContent = val;
  }

  return el;
}

function render(rows){
  if(!rows.length) return;

  const header = rows[0];
  const data = rows.slice(1);

  const mainHead = document.getElementById("mainHead");
  const shipHead = document.getElementById("shipHead");
  const inspectHead = document.getElementById("inspectHead");

  mainHead.innerHTML="";
  shipHead.innerHTML="";
  inspectHead.innerHTML="";

  [0,1,2,3,4].forEach(i=>mainHead.appendChild(makeCell("th",header[i])));
  [6,7].forEach(i=>shipHead.appendChild(makeCell("th",header[i])));
  inspectHead.appendChild(makeCell("th",header[9]));

  const mainBody = document.getElementById("mainBody");
  const shipBody = document.getElementById("shipBody");
  const inspectBody = document.getElementById("inspectBody");

  mainBody.innerHTML="";
  shipBody.innerHTML="";
  inspectBody.innerHTML="";

  const count = Math.max(data.length,10);

  for(let i=0;i<count;i++){
    const r = data[i] || [];

    const tr1=document.createElement("tr");
    [0,1,2,3,4].forEach(j=>tr1.appendChild(makeCell("td",r[j])));
    mainBody.appendChild(tr1);

    const tr2=document.createElement("tr");
    [6,7].forEach(j=>tr2.appendChild(makeCell("td",r[j])));
    shipBody.appendChild(tr2);

    const tr3=document.createElement("tr");
    tr3.appendChild(makeCell("td",r[9]));
    inspectBody.appendChild(tr3);
  }
}

async function load(){
  if(isLoading) return;
  isLoading=true;

  try{
    const res = await fetch(csvUrl + "&t=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    render(rows);
  }catch(e){
    document.body.innerHTML='<div class="error">Error loading</div>';
  }

  isLoading=false;
}

load();
setInterval(load,15000);
</script>

</body>
</html>
