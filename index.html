<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(195,215,235,.34);
  --gridSoft:rgba(180,205,230,.20);
  --gridStrong:rgba(255,122,0,.58);
  --orange:#ff7a00;
  --white:#f4f7fb;
  --mainBlock:#020202;
  --shipBlock:#07131b;
  --notesBlock:#050505;
  --jobBlock:#061018;
  --inspectionBlock:#130f18;
  --salesBlock:#1e1e1e;
  --topHeight:25px;
  --opsHeight:72px;
  --bottomHeight:38px;
  --titleHeight:16px;

  --silverHeader:
    linear-gradient(
      180deg,
      #55606a 0%,
      #46505a 38%,
      #3f4851 58%,
      #515b65 100%
    );
}

html,body{
  margin:0;width:100%;height:100%;
  background:#000;overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:geometricPrecision;
}

.screen{
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:var(--topHeight) var(--opsHeight) minmax(0,1fr) var(--bottomHeight);
  gap:2px;padding:2px;background:#000;
}

.top{
  display:grid;
  grid-template-columns:150px minmax(0,1fr) auto;
  gap:2px;overflow:hidden;
}

.logo,.announcement,.right-panel{
  border:1px solid var(--grid);
  background:#fff;
  overflow:hidden;
  min-width:0;
}

.logo{display:flex;align-items:center;justify-content:center}
.logo img{max-height:24px;max-width:148px;object-fit:contain}

.announcement{
  display:grid;
  grid-template-columns:110px minmax(0,1fr);
}

.announcement-label{
  color:var(--orange);
  font-weight:900;
  font-size:8.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid rgba(0,0,0,.18);
  white-space:nowrap;
  overflow:hidden;
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:90px;
  white-space:nowrap;
  color:#111;
  font-weight:900;
  font-size:10px;
  animation:move 42s linear infinite;
}

@keyframes move{
  from{transform:translate3d(5%,0,0)}
  to{transform:translate3d(-100%,0,0)}
}

.right-panel{
  display:grid;
  grid-template-columns:78px 180px 86px;
  justify-content:end;
  align-items:stretch;
  min-width:0;
}

.clock-box{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#000;
  font-weight:900;
  line-height:1.02;
  border-left:1px solid rgba(0,0,0,.18);
}

#dateBox{
  font-size:11px;
}

#timeBox{
  font-size:11px;
}

.weather-box{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding-left:5px;
  line-height:1.02;
  color:#000;
  font-weight:900;
  overflow:hidden;
  min-width:0;
}

.weather-top{font-size:8.5px;white-space:nowrap}
.weather-mid,.weather-bottom{font-size:7.3px;white-space:nowrap}

.updated-box{
  border-left:1px solid rgba(0,0,0,.18);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#000;
  font-weight:900;
  line-height:1.02;
  white-space:nowrap;
  overflow:hidden;
}

.updated-label{
  font-size:6.5px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:.15px;
}

#updatedBox{
  font-size:8px;
  color:#111;
}

.ops{
  display:grid;
  grid-template-columns:26fr 44fr 18fr;
  gap:3px;
  min-height:0;
  overflow:hidden;
}

.card{
  border:1px solid var(--grid);
  background:#050505;
  color:var(--white);
  overflow:hidden;
  padding:2px 5px;
  min-width:0;
}

.card-title{
  color:var(--orange);
  font-weight:900;
  font-size:8.8px;
  text-align:center;
  margin-bottom:2px;
  line-height:1;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:3px;
}

.metric{
  border:1px solid var(--grid);
  padding:2px;
  text-align:center;
  height:44px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.metric-label{
  font-size:6.9px;
  font-weight:900;
  line-height:1.02;
}

.biggreen,.bigyellow
