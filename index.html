<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(180,205,230,.25);
  --gridStrong:rgba(255,122,0,.5);
  --orange:#ff7a00;
  --white:#f4f7fb;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

/* ===== LAYOUT ===== */
.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:44px 1fr;
  gap:3px;
  padding:3px;
}

/* ===== TOP BAR ===== */
.top{
  display:grid;
  grid-template-columns:180px 1fr 280px;
  gap:3px;
}

/* LOGO */
.logo{
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--grid);
}
.logo img{
  max-height:36px;
}

/* ANNOUNCEMENTS */
.announcement{
  display:grid;
  grid-template-columns:150px 1fr;
  background:#fff;
  border:1px solid var(--grid);
}

.announcement-label{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  font-weight:900;
  font-size:11px;
  border-right:1px solid #ddd;
}

.marquee{
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:flex;
  gap:120px;
  white-space:nowrap;
  animation:scroll 60s linear infinite;
  font-weight:900;
  font-size:12px;
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* RIGHT SIDE */
.right-panel{
  display:grid;
  grid-template-columns:100px 180px;
  background:#fff;
  border:1px solid var(--grid);
}

/* DATE + TIME (STACKED) */
.clock{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:var(--orange);
  font-size:10px;
  border-right:1px solid #ddd;
}

/* WEATHER */
.weather{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-left:6px;
  font-size:9px;
  font-weight:800;
}

.weather-top{font-size:10px}
.weather-mid{font-size:9px}
.weather-bottom{font-size:8px}

/* ===== BOARD ===== */
.board{
  display:grid;
  grid-template-columns:repeat(13,1fr);
  grid-auto-rows:18px;
  border-top:1px solid var(--grid);
  border-left:1px solid var(--grid);
}

/* CELL */
.cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  color:#e6f0ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
  overflow:hidden;
  white-space:nowrap;
}

/* HEADER */
.header{
  color:var(--orange);
  font-size:9px;
  font-weight:900;
  background:#000;
}

/* STATUS COLORS */
.delay{background:#ff0000;color:#fff}
.ontime{background:#00a83a;color:#fff}

/* SALES ORDER GREY */
.sales{
  background:#1c1c1c;
  color:#ddd;
}

/* ERROR */
.error{
  color:red;
  font-size:22px;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

<!-- TOP -->
<div class="top">
  <div class="logo">
    <img src="GITHUB LOGO.png">
  </div>

  <div class="announcement">
    <div class="announcement-label">ANNOUNCEMENTS</div>
    <div class="marquee">
      <div class="marquee-track" id="announceTrack">
        <span></span><span></span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="clock">
      <div id="dateBox"></div>
      <div id="timeBox"></div>
    </div>

    <div class="weather">
      <div class="weather-top" id="wTop">Loading...</div>
      <div class="weather-mid" id="wMid"></div>
      <div class="weather-bottom" id="wBot"></div>
    </div>
  </div>
</div>

<!-- BOARD -->
<div class="board" id="board"></div>

</div>
