<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Board</title>

<style>
*{box-sizing:border-box}

:root{
  --grid:rgba(255,255,255,.26);
  --gridStrong:rgba(255,255,255,.45);
  --orange:#ffae00;
  --white:#f7f7f7;
  --muted:#bdbdbd;
  --header:linear-gradient(180deg,#7a4700 0%,#2a1600 58%,#090400 100%);
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
}

.screen{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-rows:48px 1fr 132px;
  gap:5px;
  padding:5px;
  background:#000;
}

.top-row{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:5px;
}

.logo-box{
  border:1px solid var(--grid);
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo-box img{
  max-height:40px;
  max-width:100%;
  object-fit:contain;
}

.announcement{
  border:1px solid var(--grid);
  background:#000;
  display:grid;
  grid-template-columns:155px 1fr;
  overflow:hidden;
}

.announcement-label{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--gridStrong);
}

.marquee{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:inline-flex;
  gap:80px;
  white-space:nowrap;
  color:#fff;
  font-size:14px;
  font-weight:800;
  animation:marqueeMove 36s linear infinite;
}

@keyframes marqueeMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.main-area{
  display:grid;
  grid-template-columns:58fr 16fr 8fr 18fr;
  gap:7px;
  min-height:0;
  overflow:hidden;
}

.panel{
  border:1px solid var(--grid);
  background:#000;
  overflow:hidden;
  min-width:0;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid var(--grid);
  text-align:center;
  vertical-align:middle;
  font-weight:800;
}

th{
  height:22px;
  background:var(--header);
  color:var(--orange);
  border-color:var(--gridStrong);
  font-size:11px;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
}

td{
  height:21px;
  background:#000;
  color:var(--white);
  font-size:12px;
  padding:0;
}

.cell{
  width:100%;
  height:100%;
  min-height:21px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1px 3px;
  white-space:nowrap;
  overflow:hidden;
  color:inherit;
  position:relative;
}

.cell.left{
  justify-content:flex-start;
  padding-left:6px;
  font-size:11px;
}

.cell-inner{
  white-space:nowrap;
}

.cell.long .cell-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

@keyframes cellScroll{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

.delay{
  background:#ff0000!important;
  color:#fff!important;
  animation:flashDelay .65s linear infinite;
}

@keyframes flashDelay{
  0%{background:#ff0000}
  50%{background:#320000}
  100%{background:#ff0000}
}

.ontime{
  background:#00a83a!important;
  color:#fff!important;
}

.risk{
  background:#ffbf00!important;
  color:#000!important;
}

.muted{
  color:var(--muted)!important;
}

.notes{
  border:1px solid var(--grid);
  display:grid;
  grid-template-rows:24px 1fr;
  background:#000;
  overflow:hidden;
}

.notes-title{
  background:var(--header);
  color:var(--orange);
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  padding-left:10px;
  border-bottom:1px solid var(--gridStrong);
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:1fr;
  height:100%;
}

.note-cell{
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  color:#fff;
  background:#000;
  font-size:12px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:1px 6px;
  white-space:nowrap;
  overflow:hidden;
  position:relative;
}

.note-cell:nth-child(2n){
  border-right:none;
}

.note-inner{
  white-space:nowrap;
}

.note-cell.long .note-inner{
  position:absolute;
  animation:cellScroll 18s linear infinite;
}

  font-size:22px;
  font-weight:
