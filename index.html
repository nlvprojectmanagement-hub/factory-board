<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{margin:0;background:#000;font-family:Arial}

.screen{
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:48px 1fr;
  gap:3px;padding:3px;
}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:180px 1fr 260px;
  gap:3px;
}

.logo{
  background:#fff;
  display:flex;align-items:center;justify-content:center;
}
.logo img{max-height:36px}

.ann{
  display:grid;
  grid-template-columns:140px 1fr;
  background:#fff;
}

.ann-label{
  display:flex;align-items:center;justify-content:center;
  color:#ff7a00;font-weight:900;font-size:11px;
  border-right:1px solid #ddd;
}

.marquee{
  overflow:hidden;display:flex;align-items:center;
}
.track{
  display:flex;gap:120px;
  white-space:nowrap;
  animation:scroll 60s linear infinite;
  font-weight:900;font-size:12px;
}
@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.right{
  display:grid;
  grid-template-columns:90px 170px;
  background:#fff;
}

.clock{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#ff7a00;font-weight:900;font-size:10px;
}

.weather{
  display:flex;flex-direction:column;
  justify-content:center;padding-left:6px;
  font-size:9px;font-weight:800;
}

/* ===== BOARD ===== */
.board{
  display:grid;
  grid-template-columns:repeat(13,1fr);
  grid-auto-rows:18px;
}

.cell{
  border:1px solid rgba(255,255,255,.15);
  color:#e6f0ff;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;
}

.header{color:#ff7a00}
.sales{background:#1c1c1c}
.delay{background:red;color:#fff}
.ontime{background:green;color:#fff}

.error{
  color:red;
  font-size:20px;
  padding:20px;
}
</style>
</head>

<body>

<div class="screen">

<div class="top">
  <div class="logo">
    <img src="GITHUB LOGO.png">
  </div>

  <div class="ann">
    <div class="ann-label">ANNOUNCEMENTS</div>
    <div class="marquee">
      <div class="track" id="track">
        <span></span><span></span>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="clock">
      <div id="date"></div>
      <div id="time"></div>
    </div>
    <div class="weather">
      <div id="w1">Loading...</div>
      <div id="w2"></div>
      <div id="w3"></div>
    </div>
  </div>
</div>

<div class="board" id="board"></div>

</div>

<script>
const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8DPfkyHf5Muk48ka3C6VIbFhpq-2LdxCUia3YoafY0sv6AXzUj-n69J44goiWkQWpC8Nwm58eYNah/pub?output=csv";

/* CLOCK */
function clock(){
  const d=new Date();
  date.textContent=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  time.textContent=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
setInterval(clock,1000);clock();

/* WEATHER */
async function weather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=29.6&longitude=-95.55&current=temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=precipitation_probability");
    const j=await r.json();

    const c=j.current;
    const nextRain=j.hourly.precipitation_probability.findIndex(v=>v>30);

    w1.textContent=`Stafford ${Math.round(c.temperature_2m)}°F`;
    w2.textContent=`Humidity ${c.relative_humidity_2m}%  Wind ${Math.round(c.wind_speed_10m)} mph`;
    w3.textContent=nextRain>0 ? `Rain in ~${nextRain} hrs` : "No rain soon";

  }catch{
    w1.textContent="Weather error";
  }
}
weather();

/* CSV LOAD */
async function load(){
  try{
    const res=await fetch(URL+"&t="+Date.now());
    const text=await res.text();

    if(!text || text.length<20){
      throw "CSV EMPTY";
    }

    const rows=text.split("\n").map(r=>r.split(","));
    render(rows);

  }catch(e){
    board.innerHTML='<div class="error">DATA ERROR</div>';
  }
}

/* RENDER */
function render(data){
  board.innerHTML="";

  /* ANNOUNCEMENTS */
  const ann=data.find(r=>r[0]?.toUpperCase().includes("ANNOUNC"));
  if(ann){
    document.querySelectorAll("#track span")
      .forEach(s=>s.textContent=ann[1]||"");
  }

  /* FIND HEADER */
  const start=data.findIndex(r=>r[0]?.toUpperCase().includes("SALES"));

  if(start<0){
    board.innerHTML='<div class="error">NO TABLE FOUND</div>';
    return;
  }

  const table=data.slice(start,start+25);

  table.forEach((r,i)=>{
    for(let j=0;j<13;j++){
      const
